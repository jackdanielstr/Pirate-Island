// GENERAZIONE MAPPA
// ═══════════════════════════════════════════════════

// heightmap semplice con noise
function generaHeightmap(rows, cols, cx, cy){
  const h=[];
  for(let r=0;r<rows;r++){
    h.push([]);
    for(let c=0;c<cols;c++){
      const dx=c-cx, dy=r-cy;
      const dist=Math.sqrt(dx*dx+dy*dy*1.15);
      // noise multi-ottava
      const n1=(Math.sin(c*.65+r*.3)*.5+Math.cos(c*1.1-r*.8)*.5)*2.8;
      const n2=(Math.sin(c*1.3-r*.7)*.3+Math.cos(c*.5+r*1.2)*.3)*1.2;
      const n3=Math.sin(c*2.1+r*1.8)*.4;
      h[r].push(dist - n1 - n2 - n3);
    }
  }
  return h;
}

function generaMappa(){
  const cx=G.COLS/2, cy=G.RIGHE/2;
  const hm=generaHeightmap(G.RIGHE,G.COLS,cx,cy);
  G.altezza=hm; // salva per uso nel renderer (ombreggiatura colline)

  G.mappa=Array.from({length:G.RIGHE},()=>Array(G.COLS).fill(T.OCEANO));

  // biomi base da heightmap
  for(let r=0;r<G.RIGHE;r++) for(let c=0;c<G.COLS;c++){
    const d=hm[r][c];
    if(d<2.8)       G.mappa[r][c]=T.COLLINA;   // cime
    else if(d<4.5)  G.mappa[r][c]=T.FORESTA;
    else if(d<6.8)  G.mappa[r][c]=T.ERBA;
    else if(d<8.5)  G.mappa[r][c]=T.SABBIA;
    else if(d<10.2) G.mappa[r][c]=T.BASSO;
    // else OCEANO
  }

  // ── FIUME: scende dalla collina verso il mare ──
  // trova un punto di partenza sulle colline
  let fsr=-1, fsc=-1;
  for(let r=2;r<G.RIGHE-2;r++) for(let c=2;c<G.COLS-2;c++){
    if(G.mappa[r][c]===T.COLLINA && fsr===-1){
      // prende il primo punto collinare non troppo al centro
      const dx=c-cx, dy=r-cy;
      if(Math.abs(dx)>2||Math.abs(dy)>2){ fsr=r; fsc=c; }
    }
  }
  G.fiume=[]; // array di {r,c} per il percorso
  if(fsr>0){
    let r=fsr, c=fsc;
    const visited=new Set();
    for(let step=0;step<60;step++){
      const k=r+','+c;
      if(visited.has(k)) break;
      visited.add(k);
      if(r<0||r>=G.RIGHE||c<0||c>=G.COLS) break;
      const t=G.mappa[r][c];
      if(t===T.OCEANO||t===T.BASSO) break;
      G.fiume.push({r,c});
      G.mappa[r][c]=T.FIUME;
      // scende verso il punto più basso (più alto hm = più vicino all'oceano)
      const dirs=[[r-1,c],[r+1,c],[r,c-1],[r,c+1],[r-1,c-1],[r+1,c+1],[r-1,c+1],[r+1,c-1]];
      let best=null, bestH=-Infinity;
      for(const[nr,nc] of dirs){
        if(nr<0||nr>=G.RIGHE||nc<0||nc>=G.COLS) continue;
        if(visited.has(nr+','+nc)) continue;
        const nh=hm[nr][nc];
        if(nh>bestH){ bestH=nh; best=[nr,nc]; }
      }
      if(!best) break;
      r=best[0]; c=best[1];
    }
  }

  // ── SENTIERO: dalla spiaggia verso il centro ──
  G.sentieri=[];
  // trova un tile di sabbia sul bordo est
  let psr=-1, psc=-1;
  for(let r=Math.floor(cy)-2;r<Math.floor(cy)+3;r++){
    for(let c=G.COLS-2;c>G.COLS-6;c--){
      if(G.mappa[r] && G.mappa[r][c]===T.SABBIA){ psr=r; psc=c; break; }
    }
    if(psr>0) break;
  }
  if(psr>0){
    // percorso greedy verso il centro
    let r=psr, c=psc;
    const visited=new Set();
    for(let step=0;step<50;step++){
      const k=r+','+c;
      if(visited.has(k)) break;
      visited.add(k);
      if(r<0||r>=G.RIGHE||c<0||c>=G.COLS) break;
      const t=G.mappa[r][c];
      if(t===T.COLLINA||t===T.FIUME||t===T.OCEANO||t===T.BASSO) break;
      G.sentieri.push({r,c});
      G.mappa[r][c]=T.SENTIERO;
      // muoviti verso il centro
      const dc=cx-c, dr=cy-r;
      const dirs=[];
      if(Math.abs(dc)>Math.abs(dr)) dirs.push([r,c+(dc>0?1:-1)],[r+(dr>0?1:-1),c]);
      else dirs.push([r+(dr>0?1:-1),c],[r,c+(dc>0?1:-1)]);
      dirs.push([r+(dr>0?1:-1),c+(dc>0?1:-1)]);
      let moved=false;
      for(const[nr,nc] of dirs){
        if(nr<0||nr>=G.RIGHE||nc<0||nc>=G.COLS) continue;
        if(visited.has(nr+','+nc)) continue;
        const nt=G.mappa[nr][nc];
        if(nt===T.OCEANO||nt===T.BASSO||nt===T.FIUME) continue;
        r=nr; c=nc; moved=true; break;
      }
      if(!moved) break;
    }
  }

  // ── PALUDE: zona umida vicino al fiume/acqua bassa ──
  for(let r=1;r<G.RIGHE-1;r++) for(let c=1;c<G.COLS-1;c++){
    if(G.mappa[r][c]!==T.ERBA) continue;
    // vicino a BASSO o FIUME?
    let vicino=false;
    for(const[dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]){
      const nt=G.mappa[r+dr]&&G.mappa[r+dr][c+dc];
      if(nt===T.BASSO||nt===T.FIUME){ vicino=true; break; }
    }
    if(vicino && Math.random()<0.45) G.mappa[r][c]=T.PALUDE;
  }

  // ── rocce sulle colline ──
  G.rocce=[];
  for(let r=0;r<G.RIGHE;r++) for(let c=0;c<G.COLS;c++){
    if(G.mappa[r][c]===T.COLLINA && Math.random()<0.25){
      G.rocce.push({r,c,scala:0.5+Math.random()*.6});
    }
    if((G.mappa[r][c]===T.ERBA||G.mappa[r][c]===T.FORESTA) && Math.random()<0.04){
      G.rocce.push({r,c,scala:0.4+Math.random()*.4});
    }
  }

  // ── alberi ──
  G.alberi=[];
  for(let r=0;r<G.RIGHE;r++) for(let c=0;c<G.COLS;c++){
    const t=G.mappa[r][c];
    if(t===T.FORESTA && Math.random()<0.72){
      G.alberi.push({r,c,ox:(Math.random()-.5)*.8,oy:(Math.random()-.5)*.8,
        scala:0.55+Math.random()*.42,tinta:Math.random()});
    }
    if(t===T.PALUDE && Math.random()<0.3){
      // alberi di palude più bassi/pallidi
      G.alberi.push({r,c,ox:(Math.random()-.5)*.6,oy:(Math.random()-.5)*.6,
        scala:0.35+Math.random()*.25,tinta:0.2+Math.random()*.2,palude:true});
    }
  }

  G.pois=[
    {etich:'Rotta Commerciale',icona:'🚢',c:G.COLS-3,r:2,tipo:'mercante'},
    {etich:'Pattuglia Reale',  icona:'⚓',c:1,r:2,tipo:'reale'},
    {etich:'Cala dei Corsari', icona:'💀',c:G.COLS-4,r:G.RIGHE-3,tipo:'corsaro'},
    {etich:'Rovine Antiche',   icona:'🏛',c:2,r:G.RIGHE-4,tipo:'rovine'},
  ];
}

// ═══════════════════════════════════════════════════
// CANVAS RENDERER  —  top-down dettagliato
// ═══════════════════════════════════════════════════
let canvas, ctx;
let frame=0;

// cache dei gradienti riutilizzabili
let _tileCache=null;

function applicaZoom(delta, pivotX, pivotY){
  const oldZoom=G.zoom;
  G.zoom=Math.max(G.ZOOM_MIN, Math.min(G.ZOOM_MAX, G.zoom*delta));
  if(G.zoom===oldZoom) return;
  // mantieni il punto pivot fermo
  G.camX=pivotX-(pivotX-G.camX)*(G.zoom/oldZoom);
  G.camY=pivotY-(pivotY-G.camY)*(G.zoom/oldZoom);
  limiteCamera();
}

function ridimensionaCanvas(){
  const wrap=document.getElementById('mappa-wrap');
  canvas.width=wrap.clientWidth;
  canvas.height=wrap.clientHeight;
  // centra la mappa tenendo conto dello zoom
  G.camX=Math.floor((canvas.width -G.COLS*G.TILE*G.zoom)/2);
  G.camY=Math.floor((canvas.height-G.RIGHE*G.TILE*G.zoom)/2);
  _tileCache=null;
}

// hash deterministico per variazioni per-tile
function hash(r,c,salt){
  let v=(r*2749+c*1597+salt*3571)&0xffff;
  v=((v^(v>>>7))*0x45d9f3b)&0xffff;
  return (v&0xffff)/0xffff;
}

// ── disegna un singolo tile — stile Tropico ──
function disegnaTile(t,x,y,r,c){
  const S=G.TILE;

  // ── OCEANO PROFONDO — turchese caraibico ──
  if(t===T.OCEANO){
    const v=hash(r,c,1);
    // base turchese profonda
    const baseH=195+v*12;
    ctx.fillStyle=`hsl(${baseH},72%,${18+v*6}%)`;
    ctx.fillRect(x,y,S,S);
    // vignetta bordi
    const gd=ctx.createRadialGradient(x+S*.5,y+S*.5,S*.1,x+S*.5,y+S*.5,S*.9);
    gd.addColorStop(0,'rgba(0,60,80,.0)');
    gd.addColorStop(1,'rgba(0,20,40,.4)');
    ctx.fillStyle=gd;ctx.fillRect(x,y,S,S);
    // riflesso solare bianco-turchese
    const shimmer=.04+Math.sin(frame*.025+c*.7+r*.4)*.02;
    const gs=ctx.createLinearGradient(x,y,x+S*.6,y+S*.5);
    gs.addColorStop(0,`rgba(180,255,255,${shimmer})`);
    gs.addColorStop(1,'rgba(120,220,255,0)');
    ctx.fillStyle=gs;ctx.fillRect(x,y,S,S);
    // onde caraibiche animate — 3 layer
    const f1=frame*.018+c*.55+r*.3;
    const f2=frame*.013+c*.38-r*.25;
    const f3=frame*.022-c*.3+r*.42;
    ctx.lineWidth=2;
    ctx.strokeStyle=`rgba(160,240,255,${.12+Math.sin(f1)*.05})`;
    ctx.beginPath();
    ctx.moveTo(x,y+S*.28+Math.sin(f1)*3.5);
    ctx.bezierCurveTo(x+S*.3,y+S*.28+Math.sin(f1+1)*4,x+S*.7,y+S*.28-Math.sin(f1+2)*4,x+S,y+S*.28+Math.sin(f1+3)*3.5);
    ctx.stroke();
    ctx.lineWidth=1.5;
    ctx.strokeStyle=`rgba(120,220,255,${.08+Math.sin(f2)*.03})`;
    ctx.beginPath();
    ctx.moveTo(x,y+S*.56+Math.sin(f2)*2.5);
    ctx.bezierCurveTo(x+S*.35,y+S*.56-Math.sin(f2+1)*3,x+S*.65,y+S*.56+Math.sin(f2+2)*3,x+S,y+S*.56+Math.sin(f2+3)*2.5);
    ctx.stroke();
    ctx.lineWidth=1;
    ctx.strokeStyle=`rgba(200,255,255,${.05+Math.sin(f3)*.02})`;
    ctx.beginPath();
    ctx.moveTo(x,y+S*.76+Math.sin(f3)*2);
    ctx.bezierCurveTo(x+S*.4,y+S*.76+Math.sin(f3+1)*2.5,x+S*.6,y+S*.76-Math.sin(f3)*2,x+S,y+S*.76+Math.sin(f3+2)*2);
    ctx.stroke();
    return;
  }

  // ── ACQUE BASSE — laguna color smeraldo ──
  if(t===T.BASSO){
    const sv=hash(r,c,9);
    ctx.fillStyle=`hsl(${175+sv*15},${65+sv*15}%,${32+sv*10}%)`;
    ctx.fillRect(x,y,S,S);
    // fondale corallino visibile
    for(let i=0;i<4;i++){
      const cx2=x+hash(r,c,i+300)*S, cy2=y+hash(r,c,i+310)*S;
      const col=hash(r,c,i+320);
      ctx.fillStyle=col>.6?`rgba(240,160,80,${.12+col*.08})`:`rgba(180,80,80,${.08+col*.06})`;
      ctx.beginPath();ctx.arc(cx2,cy2,2+col*4,0,Math.PI*2);ctx.fill();
    }
    // trasparenza acqua con gradiente toplight
    const gt=ctx.createLinearGradient(x,y,x,y+S);
    gt.addColorStop(0,`rgba(100,220,200,${.18+sv*.08})`);
    gt.addColorStop(1,`rgba(20,100,120,${.1})`);
    ctx.fillStyle=gt;ctx.fillRect(x,y,S,S);
    // increspature
    const fb=frame*.016+c*.48+r*.28;
    ctx.strokeStyle=`rgba(200,255,240,${.15+Math.sin(fb)*.06})`;
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(x+S*.05,y+S*.42+Math.sin(fb)*2);
    ctx.bezierCurveTo(x+S*.3,y+S*.4,x+S*.7,y+S*.44,x+S*.95,y+S*.42+Math.sin(fb+2)*2);
    ctx.stroke();
    ctx.strokeStyle=`rgba(200,255,240,${.08+Math.sin(fb+1.5)*.04})`;
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(x+S*.1,y+S*.68+Math.sin(fb+1)*1.5);
    ctx.bezierCurveTo(x+S*.4,y+S*.66,x+S*.6,y+S*.7,x+S*.9,y+S*.68+Math.sin(fb+3)*1.5);
    ctx.stroke();
    return;
  }

  // ── SABBIA — spiaggia caraibica ──
  if(t===T.SABBIA){
    const sv=hash(r,c,2);
    // sabbia calda con variazione
    const r1=215+Math.floor(sv*25), g1=190+Math.floor(sv*20), b1=130+Math.floor(sv*20);
    ctx.fillStyle=`rgb(${r1},${g1},${b1})`;
    ctx.fillRect(x,y,S,S);
    // texture granulosa
    for(let i=0;i<8;i++){
      const hx=hash(r,c,i+10),hy=hash(r,c,i+20),hr2=hash(r,c,i+30);
      ctx.fillStyle=`rgba(${Math.floor(160+hr2*60)},${Math.floor(130+hr2*40)},${Math.floor(80+hr2*40)},${.1+hr2*.12})`;
      ctx.beginPath();ctx.arc(x+hx*S,y+hy*S,0.8+hr2*2,0,Math.PI*2);ctx.fill();
    }
    // bordo bagnato verso mare
    const gw=ctx.createLinearGradient(x,y+S*.6,x,y+S);
    gw.addColorStop(0,'rgba(80,160,140,0)');
    gw.addColorStop(1,'rgba(60,140,120,.28)');
    ctx.fillStyle=gw;ctx.fillRect(x,y+S*.6,S,S*.4);
    // highlight solare sx-alto
    const gl=ctx.createLinearGradient(x,y,x+S*.4,y+S*.4);
    gl.addColorStop(0,'rgba(255,250,220,.18)');
    gl.addColorStop(1,'rgba(255,250,220,0)');
    ctx.fillStyle=gl;ctx.fillRect(x,y,S,S);
    // ombra destra-basso
    const gs2=ctx.createLinearGradient(x+S*.6,y+S*.6,x+S,y+S);
    gs2.addColorStop(0,'rgba(180,140,80,0)');
    gs2.addColorStop(1,'rgba(140,100,50,.14)');
    ctx.fillStyle=gs2;ctx.fillRect(x,y,S,S);
    return;
  }

  // ── ERBA — verde tropicale brillante ──
  if(t===T.ERBA){
    const ev=hash(r,c,3);
    const hue=108+ev*12;
    ctx.fillStyle=`hsl(${hue},${52+ev*18}%,${28+ev*10}%)`;
    ctx.fillRect(x,y,S,S);
    // macchie di colore
    const gp=ctx.createRadialGradient(
      x+S*(0.25+hash(r,c,40)*.5),y+S*(0.25+hash(r,c,41)*.5),S*.05,
      x+S*.5,y+S*.5,S*.55
    );
    gp.addColorStop(0,`hsla(${hue+8},68%,${36+ev*8}%,${.2+ev*.12})`);
    gp.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gp;ctx.fillRect(x,y,S,S);
    // ciuffi d'erba tropicale
    ctx.lineWidth=1.1;
    for(let i=0;i<7;i++){
      const gx=x+hash(r,c,i+50)*S;
      const gy=y+hash(r,c,i+60)*S;
      const gh=4+hash(r,c,i+70)*6;
      const incl=(hash(r,c,i+80)-.5)*4;
      const sat=50+ev*20;
      ctx.strokeStyle=`hsla(${hue+15},${sat}%,${44+ev*12}%,.6)`;
      ctx.beginPath();ctx.moveTo(gx,gy);ctx.lineTo(gx+incl,gy-gh);ctx.stroke();
    }
    // illuminazione calda
    const gli=ctx.createLinearGradient(x,y,x+S,y+S);
    gli.addColorStop(0,'rgba(255,255,180,.07)');
    gli.addColorStop(0.5,'rgba(0,0,0,0)');
    gli.addColorStop(1,'rgba(0,20,0,.1)');
    ctx.fillStyle=gli;ctx.fillRect(x,y,S,S);
    return;
  }

  // ── FORESTA — giungla densa ──
  if(t===T.FORESTA){
    const fv=hash(r,c,4);
    ctx.fillStyle=`hsl(${118+fv*10},${58+fv*14}%,${14+fv*8}%)`;
    ctx.fillRect(x,y,S,S);
    // chiazze di verde più scuro/chiaro
    for(let i=0;i<4;i++){
      const bx=x+hash(r,c,i+90)*S, by=y+hash(r,c,i+95)*S;
      const bv=hash(r,c,i+100);
      ctx.fillStyle=`hsla(${115+bv*20},${50+bv*20}%,${12+bv*14}%,${.3+bv*.2})`;
      ctx.beginPath();ctx.arc(bx,by,4+bv*8,0,Math.PI*2);ctx.fill();
    }
    // ombre dense sottobosco
    const gs=ctx.createRadialGradient(x+S*.6,y+S*.6,0,x+S*.5,y+S*.5,S*.7);
    gs.addColorStop(0,'rgba(0,0,0,0)');
    gs.addColorStop(1,'rgba(0,15,5,.18)');
    ctx.fillStyle=gs;ctx.fillRect(x,y,S,S);
    return;
  }

  // ── ROCCIA — pietra vulcanica scura ──
  if(t===T.ROCCIA){
    const rv=hash(r,c,5);
    ctx.fillStyle=`rgb(${Math.floor(70+rv*22)},${Math.floor(60+rv*18)},${Math.floor(50+rv*14)})`;
    ctx.fillRect(x,y,S,S);
    // texture spezzata
    const gc=ctx.createLinearGradient(x,y,x+S*.7,y+S*.7);
    gc.addColorStop(0,`rgba(160,140,110,${.12+rv*.08})`);
    gc.addColorStop(1,`rgba(20,15,10,${.15+rv*.1})`);
    ctx.fillStyle=gc;ctx.fillRect(x,y,S,S);
    ctx.strokeStyle=`rgba(25,20,14,${.25+rv*.1})`;ctx.lineWidth=.9;
    ctx.beginPath();
    ctx.moveTo(x+hash(r,c,110)*S,y+hash(r,c,111)*S);
    ctx.lineTo(x+hash(r,c,112)*S,y+hash(r,c,113)*S);
    ctx.stroke();
    return;
  }

  // ── COLLINA — roccia tropicale con vegetazione ──
  if(t===T.COLLINA){
    const cv=hash(r,c,6);
    ctx.fillStyle=`rgb(${Math.floor(118+cv*22)},${Math.floor(100+cv*18)},${Math.floor(72+cv*14)})`;
    ctx.fillRect(x,y,S,S);
    // luce forte dall'alto-sinistra stile tropico
    const gc=ctx.createLinearGradient(x,y,x+S,y+S);
    gc.addColorStop(0,`rgba(255,240,180,${.2+cv*.08})`);
    gc.addColorStop(0.4,'rgba(0,0,0,0)');
    gc.addColorStop(1,`rgba(0,0,0,${.25+cv*.12})`);
    ctx.fillStyle=gc;ctx.fillRect(x,y,S,S);
    // ciuffi di vegetazione sparsi sulle pendici
    ctx.lineWidth=1;
    for(let i=0;i<5;i++){
      const gx=x+hash(r,c,i+120)*S, gy=y+hash(r,c,i+130)*S;
      const gh=3+hash(r,c,i+140)*5;
      ctx.strokeStyle=`rgba(80,120,40,${.35+cv*.15})`;
      ctx.beginPath();ctx.moveTo(gx,gy);ctx.lineTo(gx+(hash(r,c,i+150)-.5)*3,gy-gh);ctx.stroke();
    }
    // bordo vignetta
    const gv=ctx.createRadialGradient(x+S*.4,y+S*.35,0,x+S*.5,y+S*.5,S*.7);
    gv.addColorStop(0,'rgba(255,220,150,.04)');
    gv.addColorStop(1,'rgba(0,0,0,.1)');
    ctx.fillStyle=gv;ctx.fillRect(x,y,S,S);
    return;
  }

  // ── FIUME — acqua dolce scorrente ──
  if(t===T.FIUME){
    ctx.fillStyle='#2a6040';
    ctx.fillRect(x,y,S,S);
    const ff=frame*.022+c*.45+r*.32;
    // acqua turchese chiara
    ctx.fillStyle=`rgba(40,140,200,${.82+Math.sin(ff)*.06})`;
    ctx.fillRect(x+S*.14,y+S*.14,S*.72,S*.72);
    // highlight superficie
    const gf=ctx.createLinearGradient(x+S*.14,y+S*.14,x+S*.5,y+S*.5);
    gf.addColorStop(0,`rgba(140,220,255,${.25+Math.sin(ff+1)*.08})`);
    gf.addColorStop(1,'rgba(40,140,200,0)');
    ctx.fillStyle=gf;ctx.fillRect(x+S*.14,y+S*.14,S*.72,S*.72);
    // corrente animata
    ctx.strokeStyle=`rgba(200,240,255,${.22+Math.sin(ff*1.4)*.1})`;
    ctx.lineWidth=1.2;
    ctx.beginPath();
    ctx.moveTo(x+S*.18,y+S*.4+Math.sin(ff)*2);
    ctx.bezierCurveTo(x+S*.4,y+S*.38,x+S*.6,y+S*.42,x+S*.82,y+S*.4+Math.sin(ff+2)*2);
    ctx.stroke();
    // rive erbose
    ctx.fillStyle='rgba(40,100,40,.5)';
    ctx.fillRect(x,y,S,S*.16);
    ctx.fillRect(x,y+S*.84,S,S*.16);
    ctx.fillRect(x,y,S*.16,S);
    ctx.fillRect(x+S*.84,y,S*.16,S);
    return;
  }

  // ── SENTIERO ──
  if(t===T.SENTIERO){
    // terra battuta — base sabbia scura
    const pv=hash(r,c,7);
    ctx.fillStyle=`rgb(${Math.floor(155+pv*20)},${Math.floor(125+pv*15)},${Math.floor(70+pv*12)})`;
    ctx.fillRect(x,y,S,S);
    // solchi del cammino
    ctx.strokeStyle=`rgba(120,90,45,${.4+pv*.2})`;
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x+S*.35,y);ctx.lineTo(x+S*.3,y+S);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+S*.65,y);ctx.lineTo(x+S*.7,y+S);ctx.stroke();
    // ciottoli
    for(let i=0;i<4;i++){
      const sx=x+hash(r,c,i+160)*S, sy=y+hash(r,c,i+170)*S;
      ctx.fillStyle=`rgba(180,160,110,${.3+hash(r,c,i+180)*.3})`;
      ctx.beginPath();ctx.arc(sx,sy,1+hash(r,c,i+190)*1.5,0,Math.PI*2);ctx.fill();
    }
    // erba ai bordi
    const ge=ctx.createLinearGradient(x,y,x+S*.3,y);
    ge.addColorStop(0,'rgba(40,90,30,.35)');ge.addColorStop(1,'rgba(40,90,30,0)');
    ctx.fillStyle=ge;ctx.fillRect(x,y,S*.3,S);
    const ge2=ctx.createLinearGradient(x+S,y,x+S*.7,y);
    ge2.addColorStop(0,'rgba(40,90,30,.35)');ge2.addColorStop(1,'rgba(40,90,30,0)');
    ctx.fillStyle=ge2;ctx.fillRect(x+S*.7,y,S*.3,S);
    return;
  }

  // ── PALUDE ──
  if(t===T.PALUDE){
    const mv=hash(r,c,8);
    ctx.fillStyle=`rgb(${Math.floor(45+mv*15)},${Math.floor(65+mv*18)},${Math.floor(35+mv*12)})`;
    ctx.fillRect(x,y,S,S);
    // pozze d\'acqua scura
    for(let i=0;i<2;i++){
      const wx=x+hash(r,c,i+200)*S*.7+S*.1;
      const wy=y+hash(r,c,i+210)*S*.7+S*.1;
      const wr=3+hash(r,c,i+220)*6;
      ctx.fillStyle=`rgba(20,50,40,${.55+hash(r,c,i+230)*.2})`;
      ctx.beginPath();ctx.ellipse(wx,wy,wr,wr*.6,0,0,Math.PI*2);ctx.fill();
    }
    // alghe/muschio
    ctx.strokeStyle=`rgba(30,80,30,${.4+mv*.2})`;
    ctx.lineWidth=.8;
    for(let i=0;i<3;i++){
      const ax=x+hash(r,c,i+240)*S, ay=y+hash(r,c,i+250)*S;
      ctx.beginPath();ctx.arc(ax,ay,2+hash(r,c,i+260)*3,0,Math.PI*2);ctx.stroke();
    }
    // nebbia leggera
    const gm=ctx.createRadialGradient(x+S*.5,y+S*.5,0,x+S*.5,y+S*.5,S*.6);
    gm.addColorStop(0,'rgba(150,200,150,.04)');
    gm.addColorStop(1,'rgba(100,160,100,.12)');
    ctx.fillStyle=gm;ctx.fillRect(x,y,S,S);
    return;
  }

  // fallback
  ctx.fillStyle='#333';
  ctx.fillRect(x,y,S,S);
}

// ── disegna transizioni bordo tra biomi (chiamata dentro ctx.save/scale) ──
function disegnaTransizioni(){
  const S=G.TILE;
  for(let r=0;r<G.RIGHE;r++) for(let c=0;c<G.COLS;c++){
    const t=G.mappa[r][c];
    const x=c*S, y=r*S;
    if(t!==T.SABBIA&&t!==T.ERBA&&t!==T.FORESTA) continue;
    const vicini=[[r-1,c,0,1,'top'],[r+1,c,0,-1,'bot'],[r,c-1,1,0,'lft'],[r,c+1,-1,0,'rgt']];
    for(const vicino of vicini){
      const nr=vicino[0],nc=vicino[1],dir=vicino[4];
      const nt=G.mappa[nr]&&G.mappa[nr][nc];
      if(nt===undefined) continue;
      if((nt===T.OCEANO||nt===T.BASSO)&&t===T.SABBIA){
        let gx1=x,gy1=y,gx2=x,gy2=y;
        const d=S*.4;
        if(dir==='top'){gy2=y+d;}else if(dir==='bot'){gy1=y+S;gy2=y+S-d;}
        else if(dir==='lft'){gx2=x+d;}else{gx1=x+S;gx2=x+S-d;}
        const gt=ctx.createLinearGradient(gx1,gy1,gx2,gy2);
        gt.addColorStop(0,'rgba(60,100,120,.35)');gt.addColorStop(1,'rgba(60,100,120,0)');
        ctx.fillStyle=gt;ctx.fillRect(x,y,S,S);
      }
      if(nt===T.FORESTA&&(t===T.ERBA||t===T.SABBIA)){
        let gx1=x,gy1=y,gx2=x,gy2=y;
        const d=S*.5;
        if(dir==='top'){gy2=y+d;}else if(dir==='bot'){gy1=y+S;gy2=y+S-d;}
        else if(dir==='lft'){gx2=x+d;}else{gx1=x+S;gx2=x+S-d;}
        const gf=ctx.createLinearGradient(gx1,gy1,gx2,gy2);
        gf.addColorStop(0,'rgba(10,40,10,.28)');gf.addColorStop(1,'rgba(10,40,10,0)');
        ctx.fillStyle=gf;ctx.fillRect(x,y,S,S);
      }
    }
  }
}

// ── disegna albero — palma tropicale stile Tropico ──
function disegnaAlbero(ax,ay,scala,tinta,palude){
  const S=G.TILE;
  const cx2=ax+S/2, cy2=ay+S/2;
  const h=S*scala;
  // ombra ellittica morbida
  ctx.save();
  ctx.globalAlpha=.22;
  ctx.fillStyle='#001a08';
  ctx.beginPath();
  ctx.ellipse(cx2+h*.2,cy2+h*.35,h*.38,h*.13,0,0,Math.PI*2);
  ctx.fill();
  ctx.restore();

  if(palude){
    // albero di palude — più slanciato e pallido
    ctx.strokeStyle='#5a7040';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cx2,cy2+h*.2);ctx.lineTo(cx2+h*.05,cy2-h*.3);ctx.stroke();
    ctx.fillStyle=`rgba(80,120,60,${.55+tinta*.2})`;
    ctx.beginPath();ctx.ellipse(cx2+h*.05,cy2-h*.35,h*.22,h*.15,-.2,0,Math.PI*2);ctx.fill();
    return;
  }

  // palma tropicale — tronco curvo
  const hue=105+tinta*25;
  // tronco
  const tg=ctx.createLinearGradient(cx2-S*.04,cy2+h*.15,cx2+S*.06,cy2-h*.15);
  tg.addColorStop(0,'#6b4a1e');tg.addColorStop(0.5,'#8a6228');tg.addColorStop(1,'#5a3810');
  ctx.fillStyle=tg;
  ctx.beginPath();
  ctx.moveTo(cx2-S*.05,cy2+h*.18);
  ctx.quadraticCurveTo(cx2+S*.04,cy2-h*.1,cx2+S*.06,cy2-h*.2);
  ctx.quadraticCurveTo(cx2+S*.1,cy2-h*.2,cx2+S*.08,cy2-h*.15);
  ctx.quadraticCurveTo(cx2+S*.04,cy2,cx2+S*.04,cy2+h*.18);
  ctx.closePath();ctx.fill();
  // segni tronco (anelli foglia)
  ctx.strokeStyle='rgba(60,35,8,.35)';ctx.lineWidth=.8;
  for(let i=0;i<4;i++){
    const ty=cy2-h*(.05+i*.07);
    ctx.beginPath();ctx.moveTo(cx2+S*.03,ty);ctx.lineTo(cx2+S*.09,ty+1);ctx.stroke();
  }

  // fronde — 6 foglie a ventaglio
  const foglie=[
    {a:-0.3, l:h*.75, w:h*.12, dr:-.25},
    {a:0.55,  l:h*.7,  w:h*.11, dr:.2},
    {a:-1.1, l:h*.62, w:h*.1,  dr:-.15},
    {a:1.3,  l:h*.65, w:h*.1,  dr:.18},
    {a:-1.8, l:h*.55, w:h*.09, dr:-.1},
    {a:2.1,  l:h*.5,  w:h*.09, dr:.12},
  ];
  const tx=cx2+S*.07, ty2=cy2-h*.18;
  for(const f of foglie){
    const ex2=tx+Math.cos(f.a)*f.l;
    const ey=ty2+Math.sin(f.a)*f.l*.5;
    // foglia con curva
    const lc=ctx.createLinearGradient(tx,ty2,ex2,ey);
    lc.addColorStop(0,`hsla(${hue+10},72%,${22+tinta*8}%,1)`);
    lc.addColorStop(0.5,`hsla(${hue},68%,${28+tinta*10}%,1)`);
    lc.addColorStop(1,`hsla(${hue-8},60%,${20+tinta*6}%,.7)`);
    ctx.fillStyle=lc;
    ctx.beginPath();
    ctx.moveTo(tx,ty2);
    const mx=tx+Math.cos(f.a+f.dr)*f.l*.55;
    const my=ty2+Math.sin(f.a+f.dr)*f.l*.28;
    const wx=Math.cos(f.a+Math.PI/2)*f.w;
    const wy=Math.sin(f.a+Math.PI/2)*f.w*.5;
    ctx.quadraticCurveTo(mx+wx,my+wy,ex2,ey);
    ctx.quadraticCurveTo(mx-wx*.3,my-wy*.3,tx,ty2);
    ctx.fill();
    // nervatura centrale
    ctx.strokeStyle=`rgba(${Math.floor(20+tinta*30)},${Math.floor(80+tinta*20)},${Math.floor(15+tinta*10)},.4)`;
    ctx.lineWidth=.7;
    ctx.beginPath();ctx.moveTo(tx,ty2);ctx.quadraticCurveTo(mx,my,ex2,ey);ctx.stroke();
  }
  // noce di cocco (alcuni alberi)
  if(tinta>.55){
    ctx.fillStyle='#5a3a10';
    ctx.beginPath();ctx.arc(tx+3,ty2+3,S*.055,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#7a5020';
    ctx.beginPath();ctx.arc(tx+2,ty2+2,S*.04,0,Math.PI*2);ctx.fill();
  }
  // highlight foglie in cima
  ctx.fillStyle=`rgba(255,255,200,${.05+tinta*.04})`;
  ctx.beginPath();
  ctx.ellipse(tx-h*.1,ty2-h*.08,h*.1,h*.06,-.5,0,Math.PI*2);
  ctx.fill();
}

// ── disegna roccia ──
function disegnaRoccia(rx,ry,scala){
  const S=G.TILE;
  const cx2=rx+S*.5, cy2=ry+S*.58;
  const w=S*.4*scala, h=S*.3*scala;
  // ombra morbida
  ctx.save();
  ctx.globalAlpha=.25;
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.ellipse(cx2+w*.15,cy2+h*.55,w*.75,h*.22,0,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
  // corpo principale
  const gr=ctx.createRadialGradient(cx2-w*.22,cy2-h*.3,h*.05,cx2,cy2,w);
  gr.addColorStop(0,'#a09070');
  gr.addColorStop(0.4,'#756550');
  gr.addColorStop(0.8,'#504535');
  gr.addColorStop(1,'#302820');
  ctx.fillStyle=gr;
  ctx.beginPath();
  ctx.ellipse(cx2,cy2,w,h,-.15,0,Math.PI*2);
  ctx.fill();
  // crepa/highlight
  ctx.strokeStyle='rgba(255,240,200,.18)';ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(cx2-w*.35,cy2-h*.25);
  ctx.quadraticCurveTo(cx2-w*.1,cy2-h*.45,cx2+w*.1,cy2-h*.2);
  ctx.stroke();
  // bordo scuro base
  ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1.2;
  ctx.beginPath();
  ctx.ellipse(cx2,cy2,w,h,-.15,Math.PI*.1,Math.PI*.9);
  ctx.stroke();
}

// ══════════════════════════════════════════════════════
// HELPER ISOMETRICO — prospettiva stile Tropico 2
// Luce da nord-ovest (alto-sinistra)
// Facciata SUD = più chiara, lato EST = in ombra
// ══════════════════════════════════════════════════════

// Disegna un parallelepipedo isometrico (base + facciata sud + lato est)
// bx,by = angolo in basso al centro del tile (punto di ancoraggio)
// w = larghezza, d = profondità, h = altezza (in pixel)
// colTop, colFront, colSide = colori delle tre facce
function isoBox(bx,by,w,d,h,colTop,colFront,colSide){
  // Proiezione isometrica semplificata (2:1)
  // angolo base in basso-centro
  const ox=w/2, oz=d/2;
  // 4 vertici della base
  const pts={
    //      x                    y
    nw:[bx-ox,          by-oz*.5-h],   // angolo nord-ovest in alto
    ne:[bx+ox,          by-oz*.5-h],   // angolo nord-est in alto
    se:[bx+ox,          by+oz*.5-h],   // angolo sud-est in alto
    sw:[bx-ox,          by+oz*.5-h],   // angolo sud-ovest in alto
    // basso (y += h)
    bnw:[bx-ox,         by-oz*.5],
    bne:[bx+ox,         by-oz*.5],
    bse:[bx+ox,         by+oz*.5],
    bsw:[bx-ox,         by+oz*.5],
  };

  // Tetto (top)
  ctx.fillStyle=colTop;
  ctx.beginPath();
  ctx.moveTo(pts.nw[0],pts.nw[1]);
  ctx.lineTo(pts.ne[0],pts.ne[1]);
  ctx.lineTo(pts.se[0],pts.se[1]);
  ctx.lineTo(pts.sw[0],pts.sw[1]);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.18)';ctx.lineWidth=.6;ctx.stroke();

  // Facciata sud (fronte — più chiara)
  ctx.fillStyle=colFront;
  ctx.beginPath();
  ctx.moveTo(pts.sw[0],pts.sw[1]);
  ctx.lineTo(pts.se[0],pts.se[1]);
  ctx.lineTo(pts.bse[0],pts.bse[1]);
  ctx.lineTo(pts.bsw[0],pts.bsw[1]);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.22)';ctx.lineWidth=.7;ctx.stroke();

  // Lato est (in ombra — più scuro)
  ctx.fillStyle=colSide;
  ctx.beginPath();
  ctx.moveTo(pts.ne[0],pts.ne[1]);
  ctx.lineTo(pts.se[0],pts.se[1]);
  ctx.lineTo(pts.bse[0],pts.bse[1]);
  ctx.lineTo(pts.bne[0],pts.bne[1]);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.28)';ctx.lineWidth=.7;ctx.stroke();
}

// Ombra proiettata a terra verso sud-est
function isoShadow(bx,by,w,d){
  ctx.save();
  ctx.globalAlpha=.18;
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.ellipse(bx+w*.18,by+d*.28,w*.45,d*.22,0,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// Tetto a spiovente isometrico (triangolare)
function isoRoof(bx,by,w,d,hBase,hPeak,colLeft,colRight,colFront){
  const ox=w/2, oz=d/2;
  const baseY=by-hBase;
  // Ridge (cresta) al centro
  const rx=bx, ry=baseY-hPeak;
  // Falda sinistra (nord-ovest → ridge)
  ctx.fillStyle=colLeft;
  ctx.beginPath();
  ctx.moveTo(bx-ox,baseY-oz*.5);
  ctx.lineTo(bx+ox,baseY-oz*.5);
  ctx.lineTo(rx,ry-oz*.5);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=.6;ctx.stroke();
  // Falda destra (sud-est → ridge)
  ctx.fillStyle=colRight;
  ctx.beginPath();
  ctx.moveTo(bx-ox,baseY+oz*.5);
  ctx.lineTo(bx+ox,baseY+oz*.5);
  ctx.lineTo(rx,ry+oz*.5);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=.6;ctx.stroke();
  // Frontone sud
  ctx.fillStyle=colFront;
  ctx.beginPath();
  ctx.moveTo(bx-ox,baseY+oz*.5);
  ctx.lineTo(bx+ox,baseY+oz*.5);
  ctx.lineTo(rx,ry+oz*.5);
  ctx.closePath();ctx.fill();
}

// Finestra isometrica su facciata sud
function isoWindow(bx,by,lit){
  ctx.fillStyle=lit?'rgba(255,220,100,.9)':'rgba(80,100,120,.6)';
  ctx.fillRect(bx-4,by-8,8,7);
  ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=.8;ctx.strokeRect(bx-4,by-8,8,7);
  if(lit){
    // bagliore finestra illuminata
    ctx.fillStyle='rgba(255,200,60,.15)';
    ctx.fillRect(bx-6,by-10,12,11);
    // croce vetri
    ctx.strokeStyle='rgba(100,60,0,.5)';ctx.lineWidth=.7;
    ctx.beginPath();ctx.moveTo(bx,by-8);ctx.lineTo(bx,by-1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(bx-4,by-4);ctx.lineTo(bx+4,by-4);ctx.stroke();
  }
}

// ── disegna edificio — isometrico stile Tropico 2 ──
function disegnaEdificio(tipo,ex,ey){
  const S=G.TILE;
  // Punto di ancoraggio: centro-basso del tile
  const bx=ex+S*.5, by=ey+S*.82;
  ctx.save();
  isoShadow(bx,by,S*.55,S*.28);

  switch(tipo){

    case 'taverna':{
      const w=S*.56,d=S*.32,h=S*.28;
      // corpo
      isoBox(bx,by,w,d,h,'#7a4a1a','#b87030','#7a4218');
      // tetto spiovente rosso mattone
      isoRoof(bx,by-h,w,d,0,S*.22,'#8a3010','#6a2008','#9a3818');
      // finestre sulla facciata
      isoWindow(bx-S*.1,by-h-S*.02,true);
      isoWindow(bx+S*.1,by-h-S*.02,true);
      // porta
      ctx.fillStyle='#2a1008';
      ctx.fillRect(bx-S*.07,by-h+1,S*.14,S*.12);
      ctx.beginPath();ctx.arc(bx,by-h+1,S*.07,Math.PI,0,false);ctx.fill();
      // insegna
      ctx.fillStyle='#c87820';
      ctx.fillRect(bx-S*.12,by-h-S*.18,S*.24,S*.08);
      ctx.strokeStyle='#8a4a00';ctx.lineWidth=1;ctx.strokeRect(bx-S*.12,by-h-S*.18,S*.24,S*.08);
      ctx.fillStyle='var(--oro)';ctx.font=`bold ${S*.1}px serif`;
      ctx.textAlign='center';ctx.fillText('🍺',bx,by-h-S*.12);
      break;
    }

    case 'cantiere':{
      // molo in legno
      ctx.fillStyle='#6a4a1a';
      ctx.beginPath();
      ctx.moveTo(bx-S*.4,by);ctx.lineTo(bx+S*.4,by);
      ctx.lineTo(bx+S*.4,by-S*.08);ctx.lineTo(bx-S*.4,by-S*.08);
      ctx.closePath();ctx.fill();
      // acqua nel bacino
      ctx.fillStyle=`hsl(195,65%,${30+Math.sin(frame*.04)*3}%)`;
      ctx.fillRect(bx-S*.3,by-S*.32,S*.6,S*.26);
      // scafo nave nel bacino (vista iso)
      ctx.fillStyle='#5c3a1a';
      ctx.beginPath();ctx.ellipse(bx,by-S*.22,S*.22,S*.07,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#3a2008';ctx.lineWidth=1.5;ctx.stroke();
      // albero maestro
      ctx.strokeStyle='#8a6020';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(bx,by-S*.22);ctx.lineTo(bx,by-S*.62);ctx.stroke();
      // vela ammainata
      ctx.fillStyle='rgba(240,220,170,.8)';
      ctx.beginPath();ctx.moveTo(bx,by-S*.58);ctx.lineTo(bx+S*.18,by-S*.42);ctx.lineTo(bx,by-S*.28);ctx.fill();
      // gru/argano
      isoBox(bx+S*.3,by-S*.06,S*.12,S*.1,S*.36,'#9a7030','#c89040','#7a5018');
      ctx.strokeStyle='#6a4010';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(bx+S*.3,by-S*.42);ctx.lineTo(bx+S*.05,by-S*.25);ctx.stroke();
      break;
    }

    case 'fortezza':{
      // torre centrale
      isoBox(bx,by,S*.42,S*.28,S*.52,'#8a7a5a','#a09060','#6a5a3a');
      // merlature
      for(let i=-1;i<=1;i++){
        isoBox(bx+i*S*.12,by-S*.52,S*.09,S*.08,S*.1,'#9a8a68','#b0a078','#7a6a48');
      }
      // torri angolari
      isoBox(bx-S*.28,by-S*.04,S*.18,S*.14,S*.4,'#7a6a4a','#948a5a','#6a5a38');
      isoBox(bx+S*.28,by-S*.04,S*.18,S*.14,S*.4,'#7a6a4a','#948a5a','#6a5a38');
      // portone ad arco
      ctx.fillStyle='#1a0e06';
      ctx.beginPath();ctx.arc(bx,by-S*.18,S*.09,Math.PI,0,false);
      ctx.lineTo(bx+S*.09,by+2);ctx.lineTo(bx-S*.09,by+2);ctx.closePath();ctx.fill();
      // bandiera
      ctx.strokeStyle='#8a6020';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(bx,by-S*.62);ctx.lineTo(bx,by-S*.52);ctx.stroke();
      ctx.fillStyle='var(--rum-chiaro)';
      ctx.beginPath();ctx.moveTo(bx,by-S*.62);ctx.lineTo(bx+S*.12,by-S*.58);ctx.lineTo(bx,by-S*.54);ctx.fill();
      break;
    }

    case 'fattoria':{
      // campi coltivati (base verde rigata)
      for(let i=0;i<4;i++){
        ctx.fillStyle=i%2===0?'#5a8a28':'#4a7a1e';
        ctx.fillRect(ex+S*.04+i*S*.22,ey+S*.5,S*.21,S*.35);
      }
      // capanna
      isoBox(bx-S*.12,by-S*.28,S*.32,S*.2,S*.2,'#8a6a2a','#a07e36','#6a4e18');
      isoRoof(bx-S*.12,by-S*.28-S*.2,S*.32,S*.2,0,S*.15,'#a04a10','#7a3208','#b05018');
      // spaventapasseri
      ctx.strokeStyle='#7a5020';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(bx+S*.2,by-S*.12);ctx.lineTo(bx+S*.2,by-S*.38);ctx.stroke();
      ctx.beginPath();ctx.moveTo(bx+S*.08,by-S*.3);ctx.lineTo(bx+S*.32,by-S*.3);ctx.stroke();
      ctx.fillStyle='#c8a060';ctx.beginPath();ctx.arc(bx+S*.2,by-S*.42,S*.06,0,Math.PI*2);ctx.fill();
      break;
    }

    case 'distilleria':{
      isoBox(bx,by,S*.44,S*.28,S*.32,'#6a5838','#8a7248','#5a4828');
      // ciminiera fumante
      isoBox(bx+S*.12,by-S*.32,S*.1,S*.08,S*.28,'#3a3028','#4a4038','#2a2820');
      for(let i=0;i<3;i++){
        const fy=by-S*.62-i*S*.08-Math.sin(frame*.05+i*1.2)*S*.03;
        ctx.globalAlpha=.3-i*.08;
        ctx.fillStyle='#c8c0b0';
        ctx.beginPath();ctx.arc(bx+S*.12,fy,S*(.04+i*.025),0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;
      isoRoof(bx,by-S*.32,S*.44,S*.28,0,S*.16,'#4a3820','#3a2810','#5a4828');
      // botti ISO
      for(let i=0;i<3;i++){
        isoBox(bx-S*.28+i*S*.18,by+S*.02,S*.14,S*.1,S*.14,'#7a4a18','#9a6228','#5a3210');
        ctx.strokeStyle='#4a2808';ctx.lineWidth=1;
        ctx.strokeRect(bx-S*.28+i*S*.18-S*.07,by-S*.14+S*.02,S*.14,S*.04);
      }
      break;
    }

    case 'segheria':{
      // tronchi impilati (ISO)
      for(let i=0;i<3;i++){
        const logX=bx-S*.22+i*S*.18;
        isoBox(logX,by-i*S*.06,S*.16,S*.12,S*.1+i*.02,'#9a6828','#b07e38','#7a4e18');
        // anello tronco
        ctx.strokeStyle='#5a3010';ctx.lineWidth=.8;
        ctx.beginPath();ctx.ellipse(logX-S*.08,by-i*S*.06-S*.05,S*.04,S*.04*.5,0,0,Math.PI*2);ctx.stroke();
      }
      // capannone
      isoBox(bx+S*.14,by-S*.06,S*.28,S*.2,S*.3,'#a07840','#c09050','#7a5828');
      isoRoof(bx+S*.14,by-S*.06-S*.3,S*.28,S*.2,0,S*.16,'#6a4820','#4a3010','#7a5828');
      // lama sega (lucida)
      ctx.fillStyle='#d0d0d8';
      ctx.fillRect(bx-S*.02,by-S*.18,S*.22,S*.04);
      ctx.fillStyle='rgba(200,220,255,.4)';
      ctx.fillRect(bx-S*.02,by-S*.18,S*.22,S*.02);
      break;
    }

    case 'caserma':{
      // edificio militare
      isoBox(bx,by,S*.5,S*.3,S*.34,'#7a7050','#9a9068','#5a5038');
      // tetto piatto con parapetto
      isoBox(bx,by-S*.34,S*.52,S*.32,S*.06,'#5a5438','#6a6448','#4a4428');
      // merlature
      for(let i=-2;i<=2;i++){
        isoBox(bx+i*S*.1,by-S*.4,S*.07,S*.05,S*.07,'#6a6448','#7a7458','#5a5438');
      }
      // portone
      ctx.fillStyle='#1a1208';
      ctx.fillRect(bx-S*.09,by-S*.18,S*.18,S*.19);
      ctx.beginPath();ctx.arc(bx,by-S*.18,S*.09,Math.PI,0,false);ctx.fill();
      // finestre con sbarre
      isoWindow(bx-S*.18,by-S*.26,false);
      isoWindow(bx+S*.18,by-S*.26,false);
      ctx.strokeStyle='#888';ctx.lineWidth=.8;
      for(let b=0;b<3;b++){
        ctx.beginPath();ctx.moveTo(bx-S*.22+b*S*.04,by-S*.32);ctx.lineTo(bx-S*.22+b*S*.04,by-S*.2);ctx.stroke();
        ctx.beginPath();ctx.moveTo(bx+S*.14+b*S*.04,by-S*.32);ctx.lineTo(bx+S*.14+b*S*.04,by-S*.2);ctx.stroke();
      }
      // bandiera militare
      ctx.strokeStyle='#6a5020';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(bx,by-S*.48);ctx.lineTo(bx,by-S*.4);ctx.stroke();
      ctx.fillStyle='#c83020';
      ctx.beginPath();ctx.moveTo(bx,by-S*.48);ctx.lineTo(bx+S*.1,by-S*.44);ctx.lineTo(bx,by-S*.4);ctx.fill();
      break;
    }

    case 'osservatorio':{
      // base cilindrica
      ctx.fillStyle='#8a7858';
      ctx.beginPath();ctx.ellipse(bx,by-S*.06,S*.22,S*.1,0,0,Math.PI*2);ctx.fill();
      // torre rotonda (iso approssimata)
      isoBox(bx,by-S*.06,S*.3,S*.22,S*.44,'#9a8868','#b8a478','#7a6848');
      // cupola blu
      ctx.fillStyle='#2a5080';
      ctx.beginPath();ctx.ellipse(bx,by-S*.5,S*.18,S*.09,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(bx-S*.04,by-S*.56,S*.16,S*.14,0,Math.PI,Math.PI*2,true);ctx.fill();
      ctx.strokeStyle='#1a3a60';ctx.lineWidth=1.2;ctx.stroke();
      // riflesso cupola
      ctx.fillStyle='rgba(180,220,255,.2)';
      ctx.beginPath();ctx.ellipse(bx-S*.06,by-S*.6,S*.06,S*.08,-.3,0,Math.PI);ctx.fill();
      // cannocchiale
      ctx.strokeStyle='#8a7050';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(bx-S*.06,by-S*.5);ctx.lineTo(bx+S*.24,by-S*.62);ctx.stroke();
      ctx.fillStyle='#6a5038';ctx.beginPath();ctx.arc(bx+S*.24,by-S*.62,S*.04,0,Math.PI*2);ctx.fill();
      // stelle animate
      const starA=.5+Math.sin(frame*.06)*.4;
      ctx.fillStyle=`rgba(200,220,255,${starA})`;
      ctx.beginPath();ctx.arc(bx-S*.14,by-S*.08,S*.025,0,Math.PI*2);ctx.fill();
      break;
    }

    case 'prigione':{
      // edificio basso oppressivo
      isoBox(bx,by,S*.48,S*.3,S*.28,'#4a4438','#5e5848','#3a3428');
      isoBox(bx,by-S*.28,S*.5,S*.32,S*.05,'#3a3428','#4a4438','#2a2820');
      // celle con sbarre (3)
      for(let c=-1;c<=1;c++){
        const cx2=bx+c*S*.14;
        ctx.fillStyle='rgba(0,0,0,.6)';
        ctx.fillRect(cx2-S*.04,by-S*.28,S*.08,S*.22);
        ctx.strokeStyle='#9a9888';ctx.lineWidth=1.5;
        for(let b=0;b<3;b++){
          ctx.beginPath();
          ctx.moveTo(cx2-S*.04+b*S*.04,by-S*.28);
          ctx.lineTo(cx2-S*.04+b*S*.04,by-S*.06);ctx.stroke();
        }
      }
      // portone pesante
      ctx.fillStyle='#1a1510';
      ctx.fillRect(bx-S*.09,by-S*.22,S*.18,S*.23);
      // catena
      ctx.strokeStyle='#888878';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(bx,by-S*.14,S*.04,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(bx-S*.04,by-S*.1);ctx.lineTo(bx+S*.04,by-S*.1);ctx.stroke();
      break;
    }

    case 'mercatonero':{
      // tenda principale colorata
      ctx.fillStyle='#8a1818';
      ctx.beginPath();
      ctx.moveTo(bx-S*.3,by-S*.04);
      ctx.lineTo(bx,by-S*.44);
      ctx.lineTo(bx+S*.3,by-S*.04);
      ctx.closePath();ctx.fill();
      ctx.strokeStyle='#c02020';ctx.lineWidth=1;ctx.stroke();
      // ombra tenda sinistra
      ctx.fillStyle='#6a0808';
      ctx.beginPath();
      ctx.moveTo(bx-S*.3,by-S*.04);
      ctx.lineTo(bx,by-S*.44);
      ctx.lineTo(bx,by-S*.04);
      ctx.closePath();ctx.fill();
      // bandierine
      ctx.strokeStyle='#f0c040';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(bx-S*.26,by-S*.12);ctx.lineTo(bx+S*.26,by-S*.12);ctx.stroke();
      for(let i=0;i<5;i++){
        ctx.fillStyle=i%2===0?'#f0c040':'#c03030';
        ctx.beginPath();
        ctx.moveTo(bx-S*.26+i*S*.13,by-S*.12);
        ctx.lineTo(bx-S*.2+i*S*.13,by-S*.04);
        ctx.lineTo(bx-S*.14+i*S*.13,by-S*.12);
        ctx.closePath();ctx.fill();
      }
      // bancarelle sotto
      isoBox(bx-S*.2,by+S*.02,S*.2,S*.14,S*.1,'#9a7228','#b88a38','#7a5218');
      isoBox(bx+S*.2,by+S*.02,S*.2,S*.14,S*.1,'#7a5a18','#9a7028','#5a3e10');
      // monete
      ctx.fillStyle='#f0c040';ctx.beginPath();ctx.arc(bx-S*.2,by-S*.1,S*.04,0,Math.PI*2);ctx.fill();
      break;
    }

    case 'casapirata':{
      isoBox(bx,by,S*.38,S*.24,S*.22,'#9a7040','#c09050','#7a5020');
      isoRoof(bx,by-S*.22,S*.38,S*.24,0,S*.18,'#8a2020','#6a1010','#9a2828');
      isoWindow(bx-S*.1,by-S*.18,true);
      // porta
      ctx.fillStyle='#3a1e08';
      ctx.fillRect(bx-S*.06,by-S*.12,S*.12,S*.13);
      ctx.beginPath();ctx.arc(bx,by-S*.12,S*.06,Math.PI,0,false);ctx.fill();
      // amaca fuori
      ctx.strokeStyle='#c8a060';ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(bx+S*.18,by-S*.12);
      ctx.quadraticCurveTo(bx+S*.28,by-S*.04,bx+S*.36,by-S*.12);
      ctx.stroke();
      ctx.fillStyle='rgba(200,160,80,.6)';ctx.fill();
      break;
    }

    case 'bordello':{
      isoBox(bx,by,S*.44,S*.28,S*.28,'#6a1a3a','#9a2858','#4a1028');
      isoRoof(bx,by-S*.28,S*.44,S*.28,0,S*.18,'#8a1848','#6a1030','#a82060');
      // finestre illuminate rosa
      isoWindow(bx-S*.12,by-S*.24,true);
      isoWindow(bx+S*.12,by-S*.24,true);
      // tendaggi colorati
      ctx.fillStyle='rgba(200,80,140,.5)';
      ctx.fillRect(bx-S*.16,by-S*.28,S*.1,S*.08);
      ctx.fillRect(bx+S*.06,by-S*.28,S*.1,S*.08);
      // insegna cuore
      ctx.fillStyle='#ff4488';ctx.font=`${S*.18}px serif`;
      ctx.textAlign='center';ctx.fillText('♥',bx,by-S*.38);
      // porta
      ctx.fillStyle='#2a0818';
      ctx.fillRect(bx-S*.07,by-S*.14,S*.14,S*.15);
      ctx.beginPath();ctx.arc(bx,by-S*.14,S*.07,Math.PI,0,false);ctx.fill();
      break;
    }

    case 'arena':{
      // struttura circolare/ovale
      ctx.fillStyle='#8a7a50';
      ctx.beginPath();ctx.ellipse(bx,by-S*.06,S*.36,S*.2,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#6a5a38';ctx.lineWidth=2;ctx.stroke();
      // sabbia interna
      ctx.fillStyle='#c8a060';
      ctx.beginPath();ctx.ellipse(bx,by-S*.08,S*.26,S*.14,0,0,Math.PI*2);ctx.fill();
      // gradinate (anelli)
      for(let i=1;i<=3;i++){
        ctx.strokeStyle=`rgba(100,80,40,${.3+i*.1})`;ctx.lineWidth=2;
        ctx.beginPath();ctx.ellipse(bx,by-S*.06,S*(.28+i*.04),S*(.15+i*.02),0,0,Math.PI*2);ctx.stroke();
      }
      // spade incrociate al centro
      ctx.strokeStyle='#c0c0c8';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(bx-S*.08,by-S*.16);ctx.lineTo(bx+S*.08,by-S*.0);ctx.stroke();
      ctx.beginPath();ctx.moveTo(bx+S*.08,by-S*.16);ctx.lineTo(bx-S*.08,by-S*.0);ctx.stroke();
      // muri perimetrali (iso)
      isoBox(bx,by-S*.18,S*.68,S*.04,S*.12,'#7a6a40','#9a8a58','#5a4e28');
      break;
    }

    case 'cantastorie':{
      // palco con sipari
      isoBox(bx,by+S*.02,S*.46,S*.28,S*.12,'#7a5a20','#9a7230','#5a4010');
      // montanti sipario
      isoBox(bx-S*.26,by-S*.1,S*.08,S*.06,S*.38,'#5a3a10','#7a5020','#3a2008');
      isoBox(bx+S*.26,by-S*.1,S*.08,S*.06,S*.38,'#5a3a10','#7a5020','#3a2008');
      // sipari rossi
      ctx.fillStyle='#8a1a1a';
      ctx.beginPath();ctx.moveTo(bx-S*.26,by-S*.48);ctx.lineTo(bx-S*.04,by-S*.48);ctx.lineTo(bx-S*.1,by-S*.1);ctx.lineTo(bx-S*.26,by-S*.1);ctx.closePath();ctx.fill();
      ctx.fillStyle='#8a1a1a';
      ctx.beginPath();ctx.moveTo(bx+S*.26,by-S*.48);ctx.lineTo(bx+S*.04,by-S*.48);ctx.lineTo(bx+S*.1,by-S*.1);ctx.lineTo(bx+S*.26,by-S*.1);ctx.closePath();ctx.fill();
      // frange oro
      ctx.strokeStyle='#f0c040';ctx.lineWidth=1.2;
      ctx.beginPath();ctx.moveTo(bx-S*.28,by-S*.48);ctx.lineTo(bx+S*.28,by-S*.48);ctx.stroke();
      // figurina
      ctx.fillStyle='#c8a06e';ctx.beginPath();ctx.arc(bx,by-S*.22,S*.07,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#2a1a0a';ctx.beginPath();ctx.ellipse(bx,by-S*.12,S*.05,S*.08,0,0,Math.PI*2);ctx.fill();
      // note musicali flottanti
      ctx.fillStyle='rgba(240,192,64,.75)';ctx.font=`${S*.18}px serif`;
      ctx.textAlign='center';
      ctx.fillText('♪',bx-S*.18,by-S*.32+Math.sin(frame*.06)*3);
      ctx.fillText('♫',bx+S*.18,by-S*.38+Math.sin(frame*.06+1)*3);
      break;
    }

    case 'cappella':{
      // corpo bianco
      isoBox(bx,by,S*.34,S*.22,S*.3,'#e0d8c8','#f0e8d8','#c0b8a8');
      // tetto triangolare
      isoRoof(bx,by-S*.3,S*.34,S*.22,0,S*.22,'#9a8a60','#7a6a48','#b09870');
      // campanile
      isoBox(bx,by-S*.3,S*.14,S*.1,S*.26,'#d8d0c0','#e8e0d0','#b8b0a0');
      isoRoof(bx,by-S*.56,S*.14,S*.1,0,S*.16,'#9a8a60','#7a6a48','#b09870');
      // croce dorata
      ctx.strokeStyle='#c8a020';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(bx,by-S*.72);ctx.lineTo(bx,by-S*.56);ctx.stroke();
      ctx.beginPath();ctx.moveTo(bx-S*.06,by-S*.66);ctx.lineTo(bx+S*.06,by-S*.66);ctx.stroke();
      // vetrata
      ctx.fillStyle='rgba(100,150,255,.55)';
      ctx.beginPath();ctx.arc(bx,by-S*.18,S*.07,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(255,220,80,.7)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(bx,by-S*.25);ctx.lineTo(bx,by-S*.11);ctx.stroke();
      ctx.beginPath();ctx.moveTo(bx-S*.07,by-S*.18);ctx.lineTo(bx+S*.07,by-S*.18);ctx.stroke();
      // porta ad arco
      ctx.fillStyle='#5c3a1a';
      ctx.fillRect(bx-S*.06,by-S*.12,S*.12,S*.13);
      ctx.beginPath();ctx.arc(bx,by-S*.12,S*.06,Math.PI,0,false);ctx.fill();
      break;
    }

    case 'infermeria':{
      isoBox(bx,by,S*.42,S*.26,S*.28,'#e8e8e8','#f5f5f5','#d0d0d0');
      isoBox(bx,by-S*.28,S*.44,S*.28,S*.06,'#5a6a7a','#6a7a8a','#4a5a6a');
      // croce rossa grande
      ctx.fillStyle='#cc2222';
      ctx.fillRect(bx-S*.05,by-S*.34,S*.1,S*.24);
      ctx.fillRect(bx-S*.14,by-S*.28,S*.28,S*.1);
      // finestre
      isoWindow(bx-S*.14,by-S*.2,true);
      isoWindow(bx+S*.14,by-S*.2,true);
      // porta
      ctx.fillStyle='#4a3a2a';ctx.fillRect(bx-S*.07,by-S*.14,S*.14,S*.15);
      // barella fuori
      ctx.strokeStyle='#9a8a60';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(bx-S*.26,by-S*.06);ctx.lineTo(bx-S*.12,by-S*.06);ctx.stroke();
      ctx.fillStyle='#e8d8b8';ctx.fillRect(bx-S*.25,by-S*.1,S*.13,S*.07);
      break;
    }

    case 'bagni':{
      isoBox(bx,by,S*.4,S*.26,S*.24,'#4a6a8a','#5a7a9a','#3a5a7a');
      isoRoof(bx,by-S*.24,S*.4,S*.26,0,S*.1,'#3a4a6a','#2a3a5a','#4a5a7a');
      // vasche (2 ellissi azzurre in prospettiva)
      ctx.fillStyle=`rgba(80,180,220,${.7+Math.sin(frame*.04)*.08})`;
      ctx.beginPath();ctx.ellipse(bx-S*.1,by-S*.1,S*.12,S*.06,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(bx+S*.1,by-S*.1,S*.12,S*.06,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(200,240,255,.8)';ctx.lineWidth=1;
      ctx.beginPath();ctx.ellipse(bx-S*.1,by-S*.1,S*.08,S*.04,0,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.ellipse(bx+S*.1,by-S*.1,S*.08,S*.04,0,0,Math.PI*2);ctx.stroke();
      // vapore animato
      for(let i=0;i<3;i++){
        const vx=bx-S*.15+i*S*.15;
        const vy=by-S*.18-Math.sin(frame*.05+i)*S*.04;
        ctx.fillStyle=`rgba(200,240,255,${.15+Math.sin(frame*.04+i)*.05})`;
        ctx.beginPath();ctx.arc(vx,vy,S*.04,0,Math.PI*2);ctx.fill();
      }
      break;
    }

    case 'guardia':{
      // base larga
      isoBox(bx,by,S*.28,S*.2,S*.14,'#6a6050','#8a7a60','#4a4838');
      // torre alta
      isoBox(bx,by-S*.14,S*.2,S*.14,S*.52,'#7a7060','#9a9078','#5a5848');
      // merlature
      for(let i=-1;i<=1;i++){
        isoBox(bx+i*S*.07,by-S*.66,S*.05,S*.04,S*.08,'#8a8068','#a09880','#6a6858');
      }
      // ballatoio
      isoBox(bx,by-S*.44,S*.26,S*.18,S*.04,'#7a7060','#8a8070','#5a5848');
      // luce faro rotante
      const luceA=.5+Math.sin(frame*.08)*.45;
      ctx.fillStyle=`rgba(255,220,100,${luceA})`;
      ctx.beginPath();ctx.arc(bx,by-S*.68,S*.07,0,Math.PI*2);ctx.fill();
      // raggio faro
      const ang=(frame*.03)%(Math.PI*2);
      ctx.save();ctx.globalAlpha=luceA*.25;
      ctx.strokeStyle='rgba(255,220,100,1)';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(bx,by-S*.68);
      ctx.lineTo(bx+Math.cos(ang)*S*.9,by-S*.68+Math.sin(ang)*S*.4);ctx.stroke();
      ctx.restore();
      // feritoie
      ctx.fillStyle='rgba(0,0,0,.7)';
      ctx.fillRect(bx-S*.04,by-S*.4,S*.08,S*.12);
      ctx.fillRect(bx-S*.1,by-S*.36,S*.2,S*.04);
      break;
    }

    case 'sarto':{
      isoBox(bx,by,S*.36,S*.22,S*.26,'#9a7a4a','#c09860','#7a5a28');
      isoRoof(bx,by-S*.26,S*.36,S*.22,0,S*.18,'#3a2a10','#2a1a08','#4a3818');
      ctx.strokeStyle='#f0c040';ctx.lineWidth=1;
      // vetrina con manichino
      ctx.fillStyle='rgba(200,220,240,.35)';
      ctx.fillRect(bx-S*.16,by-S*.28,S*.14,S*.2);
      ctx.strokeStyle='#8a6a30';ctx.lineWidth=1.2;ctx.strokeRect(bx-S*.16,by-S*.28,S*.14,S*.2);
      // manichino
      ctx.fillStyle='#c8a060';ctx.beginPath();ctx.arc(bx-S*.09,by-S*.28,S*.05,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#1a3a8a';ctx.beginPath();ctx.ellipse(bx-S*.09,by-S*.2,S*.06,S*.08,0,0,Math.PI*2);ctx.fill();
      // stoffe colorate
      ctx.fillStyle='#c03050';ctx.fillRect(bx+S*.02,by-S*.28,S*.06,S*.2);
      ctx.fillStyle='#20608a';ctx.fillRect(bx+S*.1,by-S*.28,S*.06,S*.2);
      // porta
      ctx.fillStyle='#2a1a08';ctx.fillRect(bx-S*.06,by-S*.12,S*.12,S*.13);
      ctx.beginPath();ctx.arc(bx,by-S*.12,S*.06,Math.PI,0,false);ctx.fill();
      // insegna forbici
      ctx.fillStyle='#f0c040';ctx.font=`${S*.16}px serif`;
      ctx.textAlign='center';ctx.fillText('✂',bx+S*.14,by-S*.36);
      break;
    }

    case 'osservatorio': // già gestito sopra ma fallback
    default:{
      // edificio generico iso
      isoBox(bx,by,S*.36,S*.22,S*.22,'#6b5530','#8a7040','#4a3818');
      isoRoof(bx,by-S*.22,S*.36,S*.22,0,S*.14,'#4a3010','#3a2008','#5a3c18');
      isoWindow(bx,by-S*.18,true);
      ctx.fillStyle='rgba(240,192,64,.5)';ctx.font=`${S*.22}px serif`;
      ctx.textAlign='center';ctx.fillText(ED[tipo]?.icona||'🏠',bx,by-S*.36);
    }
  }
  ctx.restore();
}

// ── disegna nave in mare — isometrica ──
function disegnaNav(sx,sy,colore){
  ctx.save();
  ctx.translate(sx,sy);
  const S=G.TILE;
  const sc=S/52; // scala relativa al tile

  // ombra a mare
  ctx.globalAlpha=.18;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(sc*4,sc*16,sc*26,sc*7,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;

  // scafo — vista isometrica (legno scuro)
  const scG=ctx.createLinearGradient(-sc*22,0,sc*22,sc*14);
  scG.addColorStop(0,colore||'#6a3e1a');
  scG.addColorStop(1,'#3a1e08');
  ctx.fillStyle=scG;
  ctx.beginPath();
  ctx.moveTo(-sc*22,sc*4);
  ctx.quadraticCurveTo(-sc*8,sc*14,sc*8,sc*14);
  ctx.quadraticCurveTo(sc*24,sc*14,sc*26,sc*6);
  ctx.quadraticCurveTo(sc*20,-sc*2,0,-sc*4);
  ctx.quadraticCurveTo(-sc*14,-sc*4,-sc*22,sc*4);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='#2a1008';ctx.lineWidth=1.5;ctx.stroke();

  // fascia dorata scafo
  ctx.strokeStyle='rgba(200,160,60,.6)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-sc*20,sc*5);ctx.quadraticCurveTo(sc*4,sc*11,sc*24,sc*4);ctx.stroke();

  // cannoni laterali
  ctx.fillStyle='#3a3028';
  for(let i=0;i<3;i++){
    ctx.fillRect(-sc*14+i*sc*10,sc*4,sc*5,sc*3);
  }

  // coperta
  const deckG=ctx.createLinearGradient(-sc*18,0,sc*18,0);
  deckG.addColorStop(0,'#8a6030');deckG.addColorStop(1,'#6a4820');
  ctx.fillStyle=deckG;
  ctx.beginPath();ctx.ellipse(sc*2,sc*1,sc*18,sc*8,0,0,Math.PI*2);ctx.fill();

  // albero maestro
  ctx.strokeStyle='#7a5020';ctx.lineWidth=sc*3;
  ctx.beginPath();ctx.moveTo(sc*2,sc*2);ctx.lineTo(sc*2,-sc*38);ctx.stroke();
  // pennone
  ctx.lineWidth=sc*1.5;
  ctx.beginPath();ctx.moveTo(-sc*16,-sc*28);ctx.lineTo(sc*20,-sc*28);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-sc*10,-sc*18);ctx.lineTo(sc*14,-sc*18);ctx.stroke();

  // vela principale (color crema con patch)
  const sailG=ctx.createLinearGradient(-sc*14,-sc*36,sc*18,-sc*10);
  sailG.addColorStop(0,'rgba(248,235,195,.95)');
  sailG.addColorStop(1,'rgba(210,190,140,.85)');
  ctx.fillStyle=sailG;
  ctx.beginPath();ctx.moveTo(sc*2,-sc*36);ctx.lineTo(sc*20,-sc*28);ctx.lineTo(sc*14,-sc*12);ctx.lineTo(-sc*10,-sc*18);ctx.lineTo(-sc*16,-sc*28);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=.8;ctx.stroke();
  // cucitura vela
  ctx.strokeStyle='rgba(180,150,90,.4)';ctx.lineWidth=.8;
  ctx.beginPath();ctx.moveTo(sc*2,-sc*36);ctx.lineTo(sc*2,-sc*10);ctx.stroke();

  // vela di trinchetto (più piccola)
  ctx.fillStyle='rgba(240,225,180,.8)';
  ctx.beginPath();ctx.moveTo(-sc*14,-sc*14);ctx.lineTo(-sc*4,-sc*28);ctx.lineTo(sc*4,-sc*14);ctx.closePath();ctx.fill();

  // bandiera jolly roger (animata)
  const flagWave=Math.sin(frame*.08)*sc*3;
  ctx.fillStyle='#0a0a0a';
  ctx.beginPath();
  ctx.moveTo(sc*2,-sc*38);
  ctx.lineTo(sc*16,-sc*36+flagWave);
  ctx.lineTo(sc*14,-sc*30+flagWave*.5);
  ctx.lineTo(sc*2,-sc*34);
  ctx.closePath();ctx.fill();
  // teschio bandiera
  ctx.fillStyle='rgba(255,255,255,.8)';ctx.font=`${sc*7}px serif`;
  ctx.textAlign='center';ctx.fillText('☠',sc*10,-sc*32+flagWave*.7);

  ctx.restore();
}

// ── disegna pirata — isometrico stile Tropico 2 ──
function disegnaPirata(px,py,selezionato,umore,ruolo){
  const mc=coloreUmore(umore);
  const S=G.TILE;
  const sc=S/52;

  if(selezionato){
    // alone di selezione dorato
    ctx.save();
    ctx.globalAlpha=.25;
    ctx.fillStyle='#f0c040';
    ctx.beginPath();ctx.ellipse(px,py+sc*4,sc*16,sc*6,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
    ctx.strokeStyle='rgba(240,192,64,.85)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.ellipse(px,py+sc*4,sc*16,sc*6,0,0,Math.PI*2);ctx.stroke();
  }

  // ombra isometrica a terra
  ctx.save();ctx.globalAlpha=.22;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(px+sc*2,py+sc*6,sc*8,sc*3,0,0,Math.PI*2);ctx.fill();ctx.restore();

  // STIVALI / GAMBE
  ctx.fillStyle='#2a1a08';
  // gamba sinistra
  ctx.beginPath();
  ctx.moveTo(px-sc*3,py+sc*2);ctx.lineTo(px-sc*4,py+sc*8);
  ctx.lineTo(px-sc*1,py+sc*8);ctx.lineTo(px-sc*1,py+sc*2);ctx.closePath();ctx.fill();
  // gamba destra
  ctx.beginPath();
  ctx.moveTo(px+sc*1,py+sc*2);ctx.lineTo(px+sc*0,py+sc*8);
  ctx.lineTo(px+sc*4,py+sc*8);ctx.lineTo(px+sc*3,py+sc*2);ctx.closePath();ctx.fill();
  // risvolto stivali
  ctx.fillStyle='#4a3018';
  ctx.fillRect(px-sc*4,py+sc*6,sc*4,sc*2);
  ctx.fillRect(px+sc*0,py+sc*6,sc*4,sc*2);

  // CORPO con colore per ruolo
  const bodyColors={
    'Bucaniere':['#8a2818','#5a1808'],
    'Navigatore':['#1a3a7a','#0e2252'],
    'Cannoniere':['#3a3028','#1a1818'],
    'Chirurgo':['#e8e8e0','#c0c0b8'],
    'Cuoco':['#d8c090','#a89060'],
    'Nostromo':['#3a6a28','#1e3e14'],
    'Spia':['#282820','#141410'],
    'Quartier Mastro':['#8a7020','#5a4a10'],
  };
  const bc=bodyColors[ruolo]||['#6a4a28','#3a2810'];
  const bodyG=ctx.createLinearGradient(px-sc*6,py-sc*10,px+sc*6,py+sc*2);
  bodyG.addColorStop(0,bc[0]);bodyG.addColorStop(1,bc[1]);
  ctx.fillStyle=bodyG;
  ctx.beginPath();
  ctx.moveTo(px-sc*5,py+sc*2);
  ctx.quadraticCurveTo(px-sc*7,py-sc*4,px-sc*4,py-sc*10);
  ctx.lineTo(px+sc*4,py-sc*10);
  ctx.quadraticCurveTo(px+sc*7,py-sc*4,px+sc*5,py+sc*2);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=.7;ctx.stroke();

  // CINTURA con fibbia
  ctx.fillStyle='#6a4820';
  ctx.fillRect(px-sc*5,py-sc*2,sc*10,sc*2.5);
  ctx.fillStyle='#c8a040';
  ctx.fillRect(px-sc*1.5,py-sc*1.8,sc*3,sc*2);
  ctx.strokeStyle='#8a6020';ctx.lineWidth=.8;ctx.strokeRect(px-sc*1.5,py-sc*1.8,sc*3,sc*2);

  // BRACCIA
  ctx.fillStyle=bc[0];
  // braccio sinistro
  ctx.beginPath();
  ctx.moveTo(px-sc*5,py-sc*9);ctx.lineTo(px-sc*9,py-sc*4);
  ctx.lineTo(px-sc*7,py-sc*3);ctx.lineTo(px-sc*4,py-sc*7);ctx.closePath();ctx.fill();
  // braccio destro (con spada)
  ctx.beginPath();
  ctx.moveTo(px+sc*5,py-sc*9);ctx.lineTo(px+sc*9,py-sc*2);
  ctx.lineTo(px+sc*7,py-sc*1);ctx.lineTo(px+sc*4,py-sc*7);ctx.closePath();ctx.fill();

  // SPADA (braccio destro)
  ctx.strokeStyle='#d0d0d8';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(px+sc*8,py-sc*1);ctx.lineTo(px+sc*14,py+sc*8);ctx.stroke();
  ctx.fillStyle='#c8a040';ctx.beginPath();ctx.arc(px+sc*8,py-sc*1,sc*2,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#8a6020';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(px+sc*6,py+sc*1);ctx.lineTo(px+sc*10,py-sc*3);ctx.stroke();

  // COLLO + TESTA
  ctx.fillStyle='#c8a878';
  ctx.beginPath();ctx.arc(px,py-sc*13,sc*5.5,0,Math.PI*2);ctx.fill();
  // ombra viso
  const faceG=ctx.createRadialGradient(px-sc*1.5,py-sc*14,0,px,py-sc*13,sc*5.5);
  faceG.addColorStop(0,'rgba(220,180,120,.0)');
  faceG.addColorStop(0.6,'rgba(180,130,70,.12)');
  faceG.addColorStop(1,'rgba(100,60,20,.35)');
  ctx.fillStyle=faceG;
  ctx.beginPath();ctx.arc(px,py-sc*13,sc*5.5,0,Math.PI*2);ctx.fill();

  // OCCHIO e bocca
  ctx.fillStyle='#1a0a00';
  ctx.beginPath();ctx.arc(px-sc*1.5,py-sc*13.5,sc*1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(px+sc*1.5,py-sc*13.5,sc*1,0,Math.PI*2);ctx.fill();
  // sorriso/espressione in base all'umore
  ctx.strokeStyle='#5a2a10';ctx.lineWidth=.8;
  ctx.beginPath();
  if(umore>60){
    ctx.arc(px,py-sc*12,sc*2,0.1,Math.PI-.1,false); // sorriso
  } else if(umore>30){
    ctx.moveTo(px-sc*1.8,py-sc*11.8);ctx.lineTo(px+sc*1.8,py-sc*11.8); // neutro
  } else {
    ctx.arc(px,py-sc*10.8,sc*2,Math.PI+0.1,-.1,false); // triste
  }
  ctx.stroke();

  // CAPPELLO TRICORNO isometrico
  ctx.fillStyle='#0e0e0e';
  // tesa
  ctx.beginPath();ctx.ellipse(px,py-sc*18,sc*10,sc*4,0,0,Math.PI*2);ctx.fill();
  // cupola
  const hatG=ctx.createLinearGradient(px-sc*6,py-sc*24,px+sc*4,py-sc*18);
  hatG.addColorStop(0,'#2a2a2a');hatG.addColorStop(1,'#0a0a0a');
  ctx.fillStyle=hatG;
  ctx.beginPath();
  ctx.moveTo(px-sc*6,py-sc*18);
  ctx.lineTo(px-sc*4,py-sc*24);
  ctx.lineTo(px+sc*4,py-sc*24);
  ctx.lineTo(px+sc*6,py-sc*18);
  ctx.closePath();ctx.fill();
  // coccarda/piuma dorata sul cappello
  ctx.strokeStyle='#c8a020';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(px-sc*5,py-sc*18);ctx.lineTo(px+sc*5,py-sc*18);ctx.stroke();
  ctx.fillStyle='#f0c040';
  ctx.beginPath();ctx.arc(px-sc*4,py-sc*19,sc*1.5,0,Math.PI*2);ctx.fill();

  // INDICATORE UMORE (bolla sopra la testa)
  ctx.fillStyle='rgba(0,0,0,.5)';
  ctx.beginPath();ctx.arc(px+sc*7,py-sc*26,sc*4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=mc;
  ctx.beginPath();ctx.arc(px+sc*7,py-sc*26,sc*3,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=.6;ctx.stroke();
}

// ── DRAW PRINCIPALE ──
function disegnaScena(){
  frame++;
  const Z=G.zoom;
  const TS=G.TILE*Z; // tile size effettiva con zoom

  // sfondo oceano caraibico profondo
  const bgGrad=ctx.createRadialGradient(canvas.width*.5,canvas.height*.5,0,canvas.width*.5,canvas.height*.5,canvas.width*.7);
  bgGrad.addColorStop(0,'#0d3855');
  bgGrad.addColorStop(0.5,'#082840');
  bgGrad.addColorStop(1,'#040f1a');
  ctx.fillStyle=bgGrad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // ── tile con zoom ──
  ctx.save();
  ctx.translate(G.camX, G.camY);
  ctx.scale(Z, Z);

  for(let r=0;r<G.RIGHE;r++) for(let c=0;c<G.COLS;c++){
    const t=G.mappa[r][c];
    const x=c*G.TILE, y=r*G.TILE;
    const sx=G.camX+x*Z, sy=G.camY+y*Z;
    if(sx+TS<0||sy+TS<0||sx>canvas.width||sy>canvas.height) continue;
    disegnaTile(t,x,y,r,c);
  }

  // ── transizioni biomi ──
  disegnaTransizioni();

  // ── ombreggiatura colline ──
  if(G.altezza){
    for(let r=0;r<G.RIGHE;r++) for(let c=0;c<G.COLS;c++){
      const t=G.mappa[r][c];
      if(t!==T.COLLINA&&t!==T.FORESTA&&t!==T.ERBA) continue;
      const x=c*G.TILE, y=r*G.TILE;
      const sx=G.camX+x*Z, sy=G.camY+y*Z;
      if(sx+TS<0||sy+TS<0||sx>canvas.width||sy>canvas.height) continue;
      const h=G.altezza[r][c];
      const hn=G.altezza[r-1]?G.altezza[r-1][c]:h;
      const hw=G.altezza[r][c-1]!==undefined?G.altezza[r][c-1]:h;
      const slope=(h-hn)+(h-hw);
      const shade=Math.max(-1,Math.min(1,slope*.18));
      ctx.fillStyle=shade<0?`rgba(255,240,180,${Math.min(.18,-shade)})`:`rgba(0,0,20,${Math.min(.22,shade)})`;
      ctx.fillRect(x,y,G.TILE,G.TILE);
    }
  }

  // ── rocce ──
  for(const rc of G.rocce){
    const x=rc.c*G.TILE, y=rc.r*G.TILE;
    disegnaRoccia(x,y,rc.scala);
  }

  // ── alberi ──
  for(const a of G.alberi){
    const x=a.c*G.TILE+a.ox*G.TILE;
    const y=a.r*G.TILE+a.oy*G.TILE;
    disegnaAlbero(x,y,a.scala,a.tinta,a.palude);
  }

  // ── edifici ──
  for(const b of G.edifici){
    const x=b.c*G.TILE, y=b.r*G.TILE;
    disegnaEdificio(b.tipo,x,y);
  }

  // ── pirati ──
  for(const p of G.pirati){
    const x=p.mc*G.TILE+G.TILE/2;
    const y=p.mr*G.TILE+G.TILE/2;
    disegnaPirata(x,y,G.pirataSelezionato===p.id,p.umore,p.ruolo);
    if(!G.battagliaAttiva){
      p.mc+=(Math.random()-.5)*.05*G.velocita;
      p.mr+=(Math.random()-.5)*.05*G.velocita;
      p.mc=Math.max(G.COLS*.28,Math.min(G.COLS*.68,p.mc));
      p.mr=Math.max(G.RIGHE*.3,Math.min(G.RIGHE*.68,p.mr));
    }
  }

  // ── navi in mare ──
  for(const n of G.navi){
    if(n.inMare){
      const ox=(G.COLS+1)*G.TILE+Math.sin(frame*.015+n.id)*22;
      const oy=(3+n.id*2.8)*G.TILE+Math.cos(frame*.012+n.id)*12;
      disegnaNav(ox,oy,'#5c3a1a');
    }
  }

  // ── POI ──
  for(const p of G.pois||[]){
    const x=p.c*G.TILE+G.TILE/2;
    const y=p.r*G.TILE+G.TILE/2;
    const pulse=Math.sin(frame*.04)*3;
    ctx.beginPath();ctx.arc(x,y,9+pulse,0,Math.PI*2);
    ctx.fillStyle='rgba(240,192,64,.18)';ctx.fill();
    ctx.strokeStyle='rgba(240,192,64,.55)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.font=`${G.TILE*.68}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.icona,x,y);
  }

  // ── hover costruzione ──
  if(G.modalitaCostruzione&&G.hoverC>=0&&G.hoverR>=0){
    const x=G.hoverC*G.TILE, y=G.hoverR*G.TILE;
    const ok=puoCostruire(G.hoverR,G.hoverC);
    ctx.fillStyle=ok?'rgba(80,220,80,.28)':'rgba(220,60,60,.28)';
    ctx.fillRect(x,y,G.TILE,G.TILE);
    ctx.strokeStyle=ok?'#4f4':'#f44';ctx.lineWidth=2;
    ctx.strokeRect(x,y,G.TILE,G.TILE);
    if(ok){
      ctx.globalAlpha=.5;
      disegnaEdificio(G.modalitaCostruzione,x,y);
      ctx.globalAlpha=1;
    }
  }

  ctx.restore(); // fine blocco zoom

  // ── vignette caraibica (non scalata) ──
  const vign=ctx.createRadialGradient(
    canvas.width*.5,canvas.height*.35,canvas.width*.25,
    canvas.width*.5,canvas.height*.5,canvas.width*.78
  );
  vign.addColorStop(0,'rgba(255,220,120,0)');
  vign.addColorStop(0.6,'rgba(255,180,60,.03)');
  vign.addColorStop(1,'rgba(20,5,0,.32)');
  ctx.fillStyle=vign;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

function avviaGioco(){
  document.getElementById('schermata-titolo').style.display='none';
  document.getElementById('barra-sup').style.display='flex';
  document.getElementById('principale').style.display='flex';
  document.getElementById('barra-inf').style.display='flex';

  generaMappa();

  window.addEventListener('orientationchange',()=>setTimeout(()=>{ridimensionaCanvas();impostaMobile();},100));
  for(let i=0;i<4;i++) creaaPirata();
  G.navi.push(creaNave(0,'La Marea Maledetta'));
  assegnaMissioni();
  impostaInput();
  impostaMobile();
  notifica('⚓ Benvenuto, Capitano!','La tua isola ti aspetta. Costruisci, saccheggia e forgia una leggenda!');

}

function creaaPirata(override={}){
  const n=override.nome||NOMI_PIRATI[Math.floor(Math.random()*NOMI_PIRATI.length)];
  const r=override.ruolo||RUOLI_PIRATI[Math.floor(Math.random()*RUOLI_PIRATI.length)];
  const cx=G.COLS/2, cy=G.RIGHE/2;
  // tratto casuale
  const tratto=TRATTI[Math.floor(Math.random()*TRATTI.length)];
  const p={
    id:override.id||Date.now()+Math.random(),
    nome:n, ruolo:r,
    combattimento:override.combattimento||(20+Math.floor(Math.random()*60)),
    navigazione:override.navigazione||(20+Math.floor(Math.random()*60)),
    umore:override.umore||(40+Math.floor(Math.random()*40)),
    mc:cx-2+Math.random()*4,
    mr:cy-2+Math.random()*4,
    naveId:null, paga:override.paga||4,
    tratto:override.tratto||tratto,
    oggetto:override.oggetto||null,  // {id, nome, icona, bonus}
    xp:override.xp||0,
    livello:override.livello||1,
    capitano:override.capitano||false,  // è un capitano famoso?
    titolo:override.titolo||null,
    icona:override.icona||null,
    abilita:override.abilita||null,
  };
  G.pirati.push(p);
  controllaMissione('pirati',G.pirati.length);
  return p;
}

function reclutaCapitano(id){
  const cap=CAPITANI.find(c=>c.id===id);
  if(!cap||cap.reclutato){aggMsg('Capitano non disponibile!','male');return;}
  // check costo
  for(const[k,v] of Object.entries(cap.costo)){
    if((G[k]||0)<v){aggMsg('Risorse insufficienti per '+cap.nome+'!','male');chiudiModale();return;}
  }
  for(const[k,v] of Object.entries(cap.costo)) G[k]-=v;
  cap.reclutato=true;
  creaaPirata({
    id:'cap_'+cap.id,
    nome:cap.nome, ruolo:'Capitano',
    combattimento:cap.combattimento,
    navigazione:cap.navigazione,
    umore:cap.umore,
    paga:8,
    tratto:{id:cap.id, label:cap.tratto, icona:cap.icona},
    capitano:true,
    titolo:cap.titolo,
    icona:cap.icona,
    abilita:cap.abilita,
  });
  notifica(cap.icona+' '+cap.nome+' Reclutato!',cap.abilita);
  chiudiModale();
  aggiornaUI();
}

function selezionaCostruzione(tipo){
  G.modalitaCostruzione=tipo;
  document.querySelectorAll('.btn-costruisci').forEach(b=>b.classList.remove('attivo-strumento'));
  const btn=document.getElementById('b-'+tipo);
  if(btn) btn.classList.add('attivo-strumento');
  document.getElementById('btn-annulla').classList.add('mostra');
  document.getElementById('mappa-wrap').classList.add('modalita-costruzione');
  aggMsg(`Seleziona un tile di terra per costruire ${ED[tipo].nome}.`,'info');
}
function annullaCostruzione(){
  G.modalitaCostruzione=null;
  document.querySelectorAll('.btn-costruisci').forEach(b=>b.classList.remove('attivo-strumento'));
  document.getElementById('btn-annulla').classList.remove('mostra');
  document.getElementById('mappa-wrap').classList.remove('modalita-costruzione');
}
function puoCostruire(r,c){
  if(r<0||c<0||r>=G.RIGHE||c>=G.COLS) return false;
  const t=G.mappa[r][c];
  if(t!==T.SABBIA&&t!==T.ERBA&&t!==T.COLLINA&&t!==T.SENTIERO) return false;
  if(G.edifici.find(b=>b.r===r&&b.c===c)) return false;
  // non sopra alberi o rocce
  return true;
}
function piazzaEdificio(r,c){
  const tipo=G.modalitaCostruzione, def=ED[tipo];
  if(!puoCostruire(r,c)){aggMsg('Non puoi costruire qui!','male');return;}
  if(G.oro<def.costo.oro||G.legno<def.costo.legno){
    aggMsg(`Servono ${def.costo.oro} oro e ${def.costo.legno} legno.`,'male');return;
  }
  G.oro-=def.costo.oro; G.legno-=def.costo.legno;
  G.edifici.push({tipo,r,c});
  // rimuovi alberi/rocce in quel tile
  G.alberi=G.alberi.filter(a=>!(a.r===r&&a.c===c));
  G.rocce=G.rocce.filter(rc=>!(rc.r===r&&rc.c===c));
  annullaCostruzione();
  notifica(`${def.icona} ${def.nome} Costruito!`,def.effetto);
  controllaMissione('edifici',G.edifici.length);
  aggiornaUI();
}

// factory con tutti i campi
function creaNave(id, nome){
  const nomi=['Serpente di Ferro','Burrasca Nera','Scia del Diavolo','Orizzonte Insanguinato','Mietitore dei Mari','Crimson Dawn'];
  const n = nome || nomi[id % nomi.length];
  const hpBase = 80 + (G.ricerca.completate.has('armatura')?20:0);
  return {
    id, nome:n, tipo:'sciabecco',
    hp:hpBase, hpMax:hpBase,
    // upgrade livelli (0-3 ciascuno)
    livCannoni:0,   // +15% bottino raid per livello
    livVelocita:0,  // -1 giorno raid per livello (min 1)
    livStiva:0,     // +20% bottino cibo/risorse per livello
    inMare:false, timerRaid:0,
    usura:0,        // 0-100, aumenta in mare, riduce hpMax
  };
}

function costruisciNave(){
  if(G.oro<150||G.legno<80){aggMsg('Servono 150 oro e 80 legno.','male');return;}
  if(!G.edifici.find(b=>b.tipo==='cantiere')){aggMsg('Costruisci prima un Cantiere Navale!','male');return;}
  G.oro-=150; G.legno-=80;
  G.navi.push(creaNave(G.navi.length));
  notifica('⛵ Nave Costruita!','La flotta cresce.');
  aggiornaUI();
}

function inviaRaid(){
  if(G.navi.filter(n=>!n.inMare).length===0){aggMsg('Nessuna nave disponibile!','male');return;}
  if(G.cooldownRaid>0){aggMsg('Attendi ancora '+G.cooldownRaid+' giorni prima del prossimo raid.','male');return;}
  if(G.pirati.length<2){aggMsg('Servono almeno 2 pirati!','male');return;}
  if(G.battagliaAttiva){aggMsg('Una battaglia è già in corso!','male');return;}
  apriPianificazioneRaid();
}

function aggiornaPianoRiepilogo(){
  const {nave, bersaglio, tattica}=statoPianificazione;
  const riep=document.getElementById('piano-riepilogo');
  const btn=document.getElementById('btn-lancia-raid');
  if(!riep||!btn) return;

  if(nave&&bersaglio&&tattica){
    // Calcola forza stimata
    const mediaCombo=G.pirati.reduce((a,p)=>a+p.combattimento,0)/Math.max(G.pirati.length,1);
    const forzaAtk=Math.floor(8+(mediaCombo*.12)+(nave.livCannoni||0)*4+(tattica.bonus.atk||0));
    const nemHp=bersaglio.nemico.hp;
    const nemAtk=bersaglio.nemico.atk-(nave.livVelocita||0)*2;
    const chVitt=Math.min(95,Math.max(15,Math.round(55+(forzaAtk-nemAtk)*2.5)));

    const repStr=Object.entries(bersaglio.rep).filter(([,v])=>v!==0)
      .map(([k,v])=>`${G.fazioni[k].nome} ${v>0?'+':''}${v}`).join(', ');

    riep.style.display='block';
    document.getElementById('piano-riepilogo-testo').innerHTML=`
      <div style="font-family:'Cinzel',serif;font-size:.7rem;color:var(--oro);margin-bottom:5px">Riepilogo Missione</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:.7rem">
        <span>🎯 Bersaglio:</span><span style="color:var(--pergamena)">${bersaglio.icona} ${bersaglio.nome}</span>
        <span>⛵ Nave:</span><span style="color:var(--pergamena)">${nave.nome}</span>
        <span>⚔ Tattica:</span><span style="color:var(--pergamena)">${tattica.icona} ${tattica.nome}</span>
        <span>📊 Vitt. stimata:</span><span style="color:${chVitt>60?'var(--verde-ch)':chVitt>40?'var(--oro)':'var(--rum-chiaro)'}">${chVitt}%</span>
        <span>🌐 Rep.:</span><span style="color:var(--sabbia);font-size:.62rem">${repStr||'nessuna'}</span>
        <span>⏱ Durata:</span><span style="color:var(--sabbia)">${bersaglio.durataBase} giorni</span>
      </div>`;
    btn.disabled=false;
    btn.style.opacity='1';

function lanciaRaidTattico(){
  const {nave, bersaglio, tattica}=statoPianificazione;
  if(!nave||!bersaglio||!tattica) return;

  // Controlla costo rum tattica
  if(tattica.cost_rum>0&&G.rum<tattica.cost_rum){
    aggMsg(`Servono ${tattica.cost_rum} rum per questa tattica!`,'male'); return;
  }
  if(tattica.cost_rum>0) G.rum-=tattica.cost_rum;

  chiudiModale();

  // Tattica diplomazia — tenta evasione
  if(tattica.bonus.evasion){
    const mediaNav=G.pirati.reduce((a,p)=>a+p.navigazione,0)/Math.max(G.pirati.length,1);
    const chEvasione=Math.min(70,Math.max(20, mediaNav*.6 + (nave.livVelocita||0)*10));
    if(Math.random()*100<chEvasione){
      // successo: raid silenzioso
      const bottino=Math.floor(Math.random()*(bersaglio.bottino.oro?.[1]||100)*0.6+20);
      G.oro+=bottino;
      nave.inMare=true; nave.timerRaid=bersaglio.durataBase;
      G.cooldownRaid=4; G.contatori.raid++;
      notifica('🏳 Bandiera Falsa!','Infiltrazione riuscita! +'+bottino+' oro senza combattere.');
      for(const[k,v] of Object.entries(bersaglio.rep)) if(v&&G.fazioni[k]) G.fazioni[k].rep=Math.max(-100,Math.min(100,G.fazioni[k].rep+Math.floor(v*0.4)));
      controllaMissione('raid',G.contatori.raid);
      aggiornaUI(); return;
    } else {
      aggMsg('🏳 La tattica diplomatica fallisce — si combatte!','male');
    }
  }

  // Avvia battaglia tattica
  iniziaBattegliaTattica(nave, bersaglio, tattica);
}

let datiBattaglia={};

function iniziaBattegliaTattica(nave, bersaglio, tattica){
  if(G.battagliaAttiva) return;
  G.battagliaAttiva=true;

  const mediaCombo=G.pirati.reduce((a,p)=>a+p.combattimento,0)/Math.max(G.pirati.length,1);
  const mediaNav=G.pirati.reduce((a,p)=>a+p.navigazione,0)/Math.max(G.pirati.length,1);
  const baseAtk=Math.floor(6+(mediaCombo*.14)+(nave.livCannoni||0)*5);
  const dotDmg=tattica.bonus.dot||0;

  datiBattaglia={
    nave, bersaglio, tattica,
    pHP: nave.hp, pHPMax: nave.hpMax,
    eHP: bersaglio.nemico.hp, eHPMax: bersaglio.nemico.hp,
    round:0, maxRound:8,
    baseAtk, mediaCombo, mediaNav,
    dotDmg, dotActive:false,
    log:[],
    moraleBonus:0,
    // stato turno
    faseScelta:true,
    esito:null,
  };

  mostraUiTattica();
}

function eseguiMossaTattica(mossa){
  const bd=datiBattaglia;
  bd.round++;
  bd.faseScelta=false;

  let pAtk=bd.baseAtk+(bd.tattica.bonus.atk||0);
  let eDifesa=bd.bersaglio.nemico.difesa+(bd.nave.livCannoni||0)*2;
  let pDifesa=Math.max(0,(bd.nave.livVelocita||0)*3);
  let selfDmg=0;
  let logEntry='';

  // Applica ricerca globale
  if(G.ricerca.completate.has('cannoni')) pAtk+=6;
  if(G.ricerca.completate.has('armatura')) pDifesa+=5;
  const haiBordata=G.ricerca.completate.has('bordata');
  const haiAlchimia=G.ricerca.completate.has('alchimia');

  // Effetto DoT (incendio turni precedenti)
  if(bd.dotActive&&bd.dotDmg>0){
    bd.eHP=Math.max(0,bd.eHP-bd.dotDmg);
    logEntry+=`🔥 Incendio: -${bd.dotDmg} HP al nemico. `;
  }

  switch(mossa){
    case 'bordata':{
      if(haiBordata&&Math.random()<.35) pAtk=Math.floor(pAtk*2);
      const dannoFatto=Math.max(1,pAtk-eDifesa+Math.floor(Math.random()*8));
      const dannoSubito=Math.max(0,bd.bersaglio.nemico.atk-pDifesa+Math.floor(Math.random()*6));
      bd.eHP=Math.max(0,bd.eHP-dannoFatto);
      bd.pHP=Math.max(0,bd.pHP-dannoSubito);
      logEntry=`💣 Bordata${haiBordata&&pAtk>bd.baseAtk+6?'doppia':''}: -${dannoFatto} al nemico, -${dannoSubito} a te.`;
      break;}
    case 'difendi':{
      const difRidotta=Math.floor(bd.bersaglio.nemico.atk*.6)-pDifesa;
      const dannoSubito=Math.max(0,difRidotta+Math.floor(Math.random()*4));
      const dannoFatto=Math.max(1,Math.floor(pAtk*.5)-eDifesa+Math.floor(Math.random()*5));
      bd.pHP=Math.max(0,bd.pHP-dannoSubito);
      bd.eHP=Math.max(0,bd.eHP-dannoFatto);
      logEntry=`🛡 Difesa: resistite bene! -${dannoSubito} a te, -${dannoFatto} al nemico.`;
      break;}
    case 'abborda':{
      const bonusCrew=Math.floor(bd.mediaCombo*.18);
      const dannoFatto=Math.max(1,pAtk+bonusCrew-eDifesa+Math.floor(Math.random()*10));
      const dannoSubito=Math.max(0,Math.floor(bd.bersaglio.nemico.atk*1.2)-pDifesa+Math.floor(Math.random()*8));
      bd.eHP=Math.max(0,bd.eHP-dannoFatto);
      bd.pHP=Math.max(0,bd.pHP-dannoSubito);
      for(const p of G.pirati) p.xp=(p.xp||0)+3;
      logEntry=`🗡 Abbordaggio! La ciurma imperversa: -${dannoFatto} al nemico. Pirati +3 XP.`;
      break;}
    case 'manovra':{
      const chEvit=Math.min(80,Math.max(10,Math.floor(bd.mediaNav*.8)+(bd.nave.livVelocita||0)*12));
      if(Math.random()*100<chEvit){
        const dannoFatto=Math.max(1,Math.floor(pAtk*.7)-eDifesa+Math.floor(Math.random()*6));
        bd.eHP=Math.max(0,bd.eHP-dannoFatto);
        logEntry=`💨 Manovra riuscita! Schivate e contrattaccate: -${dannoFatto} al nemico.`;
      } else {
        const dannoSubito=Math.max(2,bd.bersaglio.nemico.atk+Math.floor(Math.random()*6));
        bd.pHP=Math.max(0,bd.pHP-dannoSubito);
        logEntry=`💨 Manovra fallita! Il nemico coglie il momento: -${dannoSubito} a te.`;
      }
      break;}
    case 'rum':{
      if(G.rum>=10){
        G.rum-=10;
        const cura=haiAlchimia?25:20;
        bd.pHP=Math.min(bd.pHPMax,bd.pHP+cura);
        const dannoFatto=Math.max(1,Math.floor(pAtk*.6)-eDifesa+Math.floor(Math.random()*5));
        bd.eHP=Math.max(0,bd.eHP-dannoFatto);
        logEntry=`🍺 Rum da guerra! +${cura} HP. Contrattacco debole: -${dannoFatto} al nemico.`;
      } else {
        logEntry=`🍺 Rum insufficiente! Il cuoco è dispiaciuto.`;
      }
      break;}
    case 'ritiro':{
      bd.pHP=Math.max(10,Math.floor(bd.pHPMax*.55));
      bd.eHP=1; // forza fine battaglia con ritirata
      logEntry=`🏳 Battete in ritirata. La nave si allontana.`;
      bd.esito='ritiro';
      break;}
  }

  // Attiva DoT (incendio) se tattica
  if(bd.dotDmg>0&&!bd.dotActive) bd.dotActive=true;

  // Applicazione tattica speronamento
  if(bd.tattica.id==='speronamento'&&bd.round===1){
    const extra=bd.tattica.bonus.selfDmg||0;
    bd.pHP=Math.max(1,bd.pHP-extra);
    logEntry+=` (Speronamento: -${extra} danno proprio)`;
  }

  bd.log.push(logEntry);

  // Check fine battaglia
  if(bd.esito==='ritiro'||bd.eHP<=0||bd.pHP<=0||bd.round>=bd.maxRound){
    fineBattegliaTattica();
  } else {
    bd.faseScelta=true;
    mostraUiTattica();
  }
}

function fineBattegliaTattica(){
  const bd=datiBattaglia;
  const vinto=bd.esito!=='ritiro'&&bd.pHP>bd.eHP;
  const ritirato=bd.esito==='ritiro';
  bd.faseScelta=false;

  bd.nave.hp=Math.max(5,bd.pHP);

  if(vinto){
    // Calcola bottino
    let oro=0,cibo=0,legno=0,rum=0,ricerca=0;
    const b=bd.bersaglio.bottino;
    if(b.oro)     oro=b.oro[0]+Math.floor(Math.random()*(b.oro[1]-b.oro[0]));
    if(b.cibo)    cibo=b.cibo[0]+Math.floor(Math.random()*(b.cibo[1]-b.cibo[0]));
    if(b.legno)   legno=b.legno[0]+Math.floor(Math.random()*(b.legno[1]-b.legno[0]));
    if(b.rum)     rum=b.rum[0]+Math.floor(Math.random()*(b.rum[1]-b.rum[0]));
    if(b.ricerca) ricerca=b.ricerca[0]+Math.floor(Math.random()*(b.ricerca[1]-b.ricerca[0]));

    // Moltiplicatori potenziamenti
    const multCan=1+(bd.nave.livCannoni||0)*.12;
    const multSti=1+(bd.nave.livStiva||0)*.18;
    const multRic=G.ricerca.completate.has('cannoni')?1.25:1;
    oro=Math.floor(oro*multCan*multRic);
    cibo=Math.floor(cibo*multSti);

    G.oro+=oro; G.cibo+=cibo; G.legno+=legno; G.rum+=rum; G.ricerca.punti+=ricerca;

    // Effetti reputazione
    for(const[k,v] of Object.entries(bd.bersaglio.rep))
      if(v&&G.fazioni[k]) G.fazioni[k].rep=Math.max(-100,Math.min(100,G.fazioni[k].rep+v));

    // XP pirati
    for(const p of G.pirati){ p.umore=Math.min(100,p.umore+18); p.xp=(p.xp||0)+20; }

    // Possibile prigioniero
    if(Math.random()<.45) catturaPrigioniero(bd.bersaglio.rep.reale<0?'Marina Reale':'Mercante');

    // Evento speciale porto coloniale: upgrade gratuito
    if(bd.bersaglio.id==='porto_coloniale'){
      const upgTipi=['cannoni','velocita','stiva'];
      const t=upgTipi[Math.floor(Math.random()*upgTipi.length)];
      const chiave='liv'+t.charAt(0).toUpperCase()+t.slice(1);
      if(bd.nave[chiave]<3){ bd.nave[chiave]++; bd.log.push(`🎁 Upgrade gratuito: ${t}!`); }
    }

    // Evento speciale corsaro: +bonus rep
    if(bd.bersaglio.id==='nave_corsara'){
      G.fazioni.corsaro.rep=Math.min(100,G.fazioni.corsaro.rep+10);
    }

    const bottinoStr=[oro&&`${oro}💰`,cibo&&`${cibo}🍖`,legno&&`${legno}🪵`,rum&&`${rum}🍺`,ricerca&&`${ricerca}🔭`].filter(Boolean).join(' ');
    bd.log.push(`🏆 VITTORIA! Bottino: ${bottinoStr}`);
    notifica('⚔ Vittoria!',`${bd.bersaglio.nome} sconfitta. ${bottinoStr}`);

    // Lancia raid (nave va in mare a tornare)
    bd.nave.inMare=true;
    bd.nave.timerRaid=bd.bersaglio.durataBase;
    G.cooldownRaid=4; G.contatori.raid++;
    controllaMissione('raid',G.contatori.raid);

  } else if(ritirato){
    bd.log.push(`🏳 Ritirata tattica. La nave torna in porto.`);
    for(const p of G.pirati) p.umore=Math.max(10,p.umore-10);
    notifica('🏳 Ritirata','Avete battuto in ritirata. La nave è danneggiata.','male');
  } else {
    // Sconfitta
    bd.nave.hp=Math.max(5,Math.floor(bd.nave.hpMax*.2));
    for(const p of G.pirati) p.umore=Math.max(5,p.umore-22);
    bd.log.push(`💀 SCONFITTA. Battete in ritirata con la nave semidistrutta.`);
    notifica('💀 Sconfitta!',`${bd.nave.nome} si ritira sconfitta.`,'male');
  }

  mostraUiTattica();
  aggiornaUI();
}

function chiudiBattegliaTattica(){
  G.battagliaAttiva=false;
  const ov=document.getElementById('overlay-battaglia');
  if(ov){ ov.classList.remove('aperto'); ov.innerHTML=''; }
  aggiornaUI();
}

function lanciaRaid(nave){

  nave.inMare=true;
  const dur=Math.max(1,2+Math.floor(Math.random()*2)-(nave.livVelocita||0));

// ── PRIGIONIERI ──
function catturaPrigioniero(fazione){
  const nome=NOMI_PRIGIONIERI[Math.floor(Math.random()*NOMI_PRIGIONIERI.length)];
  const riscatto=100+Math.floor(Math.random()*200);
  G.prigionieri.push({id:Date.now(),nome,fazione,riscatto,giorni:0});
  aggMsg(`⛓ Catturato: ${nome} (${fazione})!`,'info');
}
function riscattaPrigioniero(id){
  const p=G.prigionieri.find(x=>x.id===id);
  if(!p) return;
  if(!G.edifici.find(b=>b.tipo==='prigione')){aggMsg('Costruisci prima una Prigione!','male');return;}

function puoRicercare(tech){return !G.ricerca.completate.has(tech.id)&&tech.req.every(r=>G.ricerca.completate.has(r));}
function faiRicerca(techId){
  const tech=TECH.find(t=>t.id===techId);
  if(!tech||!puoRicercare(tech)) return;
  if(G.ricerca.punti<tech.costo){aggMsg(`Servono ${tech.costo} punti ricerca!`,'male');return;}
  G.ricerca.punti-=tech.costo;
  G.ricerca.completate.add(techId);
  if(techId==='leggenda') for(const p of G.pirati) p.umore=Math.min(100,p.umore+15);
  notifica(`${tech.icona} ${tech.nome} Studiata!`,tech.desc);
  controllaMissione('ricerca',G.ricerca.completate.size);
  mostraTab('ricerca');aggiornaUI();
}
