<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tropico 2: Pirate's Revenge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Merriweather:wght@400;700&display=swap');

:root {
  --gold: #D4AF37;
  --dark-gold: #8B7500;
  --dark-bg: #1a1a2e;
  --panel-bg: #16213e;
  --accent-color: #0f3460;
  --text-primary: #eaeaea;
  --text-secondary: #b0b0b0;
  --success: #4CAF50;
  --danger: #FF6B6B;
  --warning: #FFA500;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; width: 100%; overflow: hidden; font-family: 'Merriweather', serif; background: var(--dark-bg); color: var(--text-primary); }
body { display: flex; flex-direction: column; user-select: none; }

/* TITLE SCREEN */
#title-screen {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 30px;
  animation: titleFadeIn 0.8s ease;
}

#title-screen.hidden { display: none; }

@keyframes titleFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes bobbing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

.title-logo { font-size: 4rem; animation: bobbing 3s ease-in-out infinite; }
.title-text h1 {
  font-size: 3.5rem;
  font-family: 'Cinzel', serif;
  color: var(--gold);
  text-shadow: 0 0 30px rgba(212, 175, 55, 0.8), 2px 2px 4px #000;
  letter-spacing: 3px;
  margin-bottom: 10px;
}
.title-text p {
  font-size: 1.3rem;
  color: var(--text-secondary);
  letter-spacing: 2px;
}
.start-button {
  margin-top: 40px;
  padding: 15px 50px;
  font-size: 1.3rem;
  font-family: 'Cinzel', serif;
  background: linear-gradient(135deg, var(--dark-gold), var(--gold));
  color: #000;
  border: 2px solid var(--gold);
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
}
.start-button:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(212, 175, 55, 0.8); }

/* MAIN LAYOUT */
#main-container {
  display: none;
  flex: 1;
  flex-direction: row;
  height: 100vh;
}
#main-container.visible { display: flex; }

#game-canvas {
  flex: 1;
  background: linear-gradient(180deg, #1a4d6d 0%, #0d2a3d 100%);
  cursor: default;
  display: block;
}

/* RIGHT PANEL */
#right-panel {
  width: 350px;
  background: linear-gradient(180deg, var(--panel-bg) 0%, #0f172a 100%);
  border-left: 3px solid var(--dark-gold);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: -5px 0 20px rgba(0, 0, 0, 0.5);
}

#panel-header {
  background: linear-gradient(180deg, var(--accent-color) 0%, rgba(15, 52, 96, 0.8) 100%);
  padding: 15px;
  border-bottom: 2px solid var(--dark-gold);
  text-align: center;
}

#panel-header h2 {
  color: var(--gold);
  font-size: 1.5rem;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

#day-display {
  color: var(--text-secondary);
  font-size: 0.95rem;
}

.resources-bar {
  background: rgba(0, 0, 0, 0.4);
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 10px;
}

.resource {
  background: rgba(212, 175, 55, 0.1);
  border: 1px solid var(--dark-gold);
  border-radius: 4px;
  padding: 8px;
  text-align: center;
  font-size: 0.85rem;
}

.resource .value {
  color: var(--gold);
  font-weight: bold;
  font-size: 1.1rem;
}

.resource .label {
  color: var(--text-secondary);
  font-size: 0.75rem;
  text-transform: uppercase;
  margin-top: 3px;
}

/* TABS */
#panel-tabs {
  display: flex;
  border-bottom: 1px solid var(--dark-gold);
  background: rgba(0, 0, 0, 0.2);
}

.panel-tab {
  flex: 1;
  padding: 10px;
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 1.2rem;
  transition: all 0.2s ease;
  border-bottom: 3px solid transparent;
}

.panel-tab:hover { color: var(--gold); background: rgba(212, 175, 55, 0.1); }
.panel-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

/* PANEL CONTENT */
#panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}

#panel-content::-webkit-scrollbar { width: 8px; }
#panel-content::-webkit-scrollbar-track { background: transparent; }
#panel-content::-webkit-scrollbar-thumb { background: var(--dark-gold); border-radius: 4px; }

.section-title {
  color: var(--gold);
  font-size: 1.1rem;
  font-weight: bold;
  margin-top: 15px;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--dark-gold);
}

.building-card {
  background: rgba(15, 52, 96, 0.6);
  border: 1px solid var(--dark-gold);
  border-radius: 5px;
  padding: 10px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.building-card:hover:not(:disabled) {
  background: rgba(212, 175, 55, 0.15);
  border-color: var(--gold);
}

.building-card.disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.building-info {
  flex: 1;
}

.building-name {
  color: var(--text-primary);
  font-weight: bold;
  font-size: 0.95rem;
}

.building-cost {
  color: var(--text-secondary);
  font-size: 0.8rem;
  margin-top: 3px;
}

.building-cost span {
  color: var(--gold);
  font-weight: bold;
}

.building-icon {
  font-size: 2rem;
  margin-right: 10px;
}

/* BOTTOM HUD */
#bottom-hud {
  background: linear-gradient(0deg, var(--panel-bg) 0%, rgba(22, 33, 62, 0.8) 100%);
  border-top: 2px solid var(--dark-gold);
  padding: 12px 15px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  min-height: 60px;
}

.hud-button {
  padding: 10px 20px;
  background: linear-gradient(135deg, var(--accent-color), rgba(15, 52, 96, 0.6));
  border: 1px solid var(--dark-gold);
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 0.95rem;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.2s ease;
  min-width: 100px;
}

.hud-button:hover:not(:disabled) {
  background: linear-gradient(135deg, var(--dark-gold), var(--gold));
  color: #000;
  box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
}

.hud-button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.hud-button.danger {
  border-color: var(--danger);
  color: var(--danger);
}

.hud-button.danger:hover:not(:disabled) {
  background: rgba(255, 107, 107, 0.2);
  box-shadow: 0 0 15px rgba(255, 107, 107, 0.4);
}

/* NOTIFICATIONS */
#notifications {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 400;
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 300px;
  pointer-events: none;
}

.notification {
  background: linear-gradient(135deg, var(--panel-bg), rgba(15, 52, 96, 0.8));
  border: 1px solid var(--dark-gold);
  border-radius: 5px;
  padding: 15px;
  color: var(--text-primary);
  font-size: 0.9rem;
  animation: slideIn 0.3s ease;
  box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
}

.notification.success { border-color: var(--success); color: var(--success); }
.notification.danger { border-color: var(--danger); color: var(--danger); }
.notification.warning { border-color: var(--warning); color: var(--warning); }

@keyframes slideIn {
  from { opacity: 0; transform: translateX(100px); }
  to { opacity: 1; transform: translateX(0); }
}

@media (max-width: 768px) {
  #right-panel { width: 280px; }
  .title-text h1 { font-size: 2.5rem; }
}

@media (max-width: 600px) {
  #main-container { flex-direction: column; }
  #right-panel { width: 100%; height: 40%; border-left: none; border-top: 3px solid var(--dark-gold); order: 2; }
  #game-canvas { order: 1; }
  #bottom-hud { order: 3; }
  .title-text h1 { font-size: 2rem; }
}
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen">
  <div class="title-logo">🏝️</div>
  <div class="title-text">
    <h1>TROPICO 2</h1>
    <p>PIRATE'S REVENGE</p>
  </div>
  <button class="start-button" onclick="startGame()">SET SAIL!</button>
</div>

<!-- MAIN CONTAINER -->
<div id="main-container">
  <canvas id="game-canvas"></canvas>
  
  <div id="right-panel">
    <div id="panel-header">
      <h2>⚓ COMMAND CENTER</h2>
      <div id="day-display">Day 1</div>
    </div>

    <div class="resources-bar">
      <div class="resource">
        <div class="value" id="res-money">1000</div>
        <div class="label">💰 Money</div>
      </div>
      <div class="resource">
        <div class="value" id="res-workers">50</div>
        <div class="label">👥 Workers</div>
      </div>
      <div class="resource">
        <div class="value" id="res-food">100</div>
        <div class="label">🍖 Food</div>
      </div>
    </div>

    <div id="panel-tabs">
      <button class="panel-tab active" onclick="switchTab('buildings')">🏗 BUILD</button>
      <button class="panel-tab" onclick="switchTab('troops')">⚔ TROOPS</button>
      <button class="panel-tab" onclick="switchTab('diplomacy')">🤝 RELATIONS</button>
      <button class="panel-tab" onclick="switchTab('upgrades')">⚙ TECH</button>
    </div>

    <div id="panel-content"></div>
  </div>
</div>

<!-- BOTTOM HUD -->
<div id="bottom-hud">
  <button class="hud-button" onclick="sendRaid()">⚔ SEND RAID</button>
  <button class="hud-button" onclick="tradeRoute()">🚢 TRADE</button>
  <button class="hud-button" onclick="diplomacy()">📜 DIPLOMACY</button>
  <button class="hud-button" onclick="gameSpeed()">⏱ SPEED</button>
  <button class="hud-button danger" onclick="pauseGame()">⏸ PAUSE</button>
</div>

<!-- NOTIFICATIONS -->
<div id="notifications"></div>

<script>
const GAME = {
  day: 1,
  money: 1000,
  workers: 50,
  food: 100,
  paused: false,
  speed: 1,
  buildings: [],
  gameRunning: false,
};

const BUILDINGS = {
  residence: { name: 'Residence', cost: 100, icon: '🏠', workers: 5 },
  armory: { name: 'Armory', cost: 300, icon: '🔫', workers: 8 },
  farm: { name: 'Farm', cost: 150, icon: '🌿', workers: 10 },
  dock: { name: 'Dock', cost: 400, icon: '⚓', workers: 12 },
  tavern: { name: 'Tavern', cost: 200, icon: '🍺', workers: 4 },
  fortress: { name: 'Fortress', cost: 500, icon: '🏰', workers: 15 },
};

function startGame() {
  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('main-container').classList.add('visible');
  GAME.gameRunning = true;
  
  const canvas = document.getElementById('game-canvas');
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  
  initializeGameLoop();
  renderBuildingsTab();
  updateUI();
}

function initializeGameLoop() {
  setInterval(() => {
    if (!GAME.paused && GAME.gameRunning) {
      GAME.day++;
      GAME.food += 10;
      GAME.money += 50;
      GAME.workers = Math.max(20, GAME.workers);
      GAME.food -= GAME.workers * 0.5;
      
      if (GAME.food < 0) {
        showNotification('⚠ Starvation! Workers are leaving!', 'danger');
        GAME.workers -= 10;
        GAME.food = 0;
      }
      
      if (GAME.workers <= 0) {
        showNotification('💀 Your colony has been abandoned!', 'danger');
        GAME.gameRunning = false;
      }
      
      drawMap();
      updateUI();
    }
  }, 2000 / GAME.speed);
}

function drawMap() {
  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');
  
  ctx.fillStyle = 'linear-gradient(180deg, #1a4d6d 0%, #0d2a3d 100%)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  ctx.fillStyle = '#8B7355';
  ctx.beginPath();
  ctx.ellipse(canvas.width / 2, canvas.height / 2, 200, 150, 0, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = '#D2B48C';
  ctx.beginPath();
  ctx.ellipse(canvas.width / 2, canvas.height / 2, 180, 130, 0, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = '#228B22';
  ctx.beginPath();
  ctx.ellipse(canvas.width / 2, canvas.height / 2, 150, 100, 0, 0, Math.PI * 2);
  ctx.fill();
  
  GAME.buildings.forEach((building, index) => {
    const x = canvas.width / 2 + (Math.sin(index) * 150);
    const y = canvas.height / 2 + (Math.cos(index) * 100);
    
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.fillRect(x - 15, y + 25, 30, 10);
    
    ctx.font = '30px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(building.icon, x, y);
  });
  
  const shipX = canvas.width / 2 + 250;
  const shipY = canvas.height / 2 - 150;
  ctx.font = '40px Arial';
  ctx.fillText('🚢', shipX, shipY);
  ctx.fillText('⛵', shipX - 100, shipY + 100);
}

function updateUI() {
  document.getElementById('res-money').textContent = Math.floor(GAME.money);
  document.getElementById('res-workers').textContent = GAME.workers;
  document.getElementById('res-food').textContent = Math.floor(GAME.food);
  document.getElementById('day-display').textContent = `Day ${GAME.day}`;
}

function switchTab(tab) {
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  
  const content = document.getElementById('panel-content');
  content.innerHTML = '';
  
  if (tab === 'buildings') renderBuildingsTab();
  else if (tab === 'troops') renderTroopsTab();
  else if (tab === 'diplomacy') renderDiplomacyTab();
  else if (tab === 'upgrades') renderUpgradesTab();
}

function renderBuildingsTab() {
  const content = document.getElementById('panel-content');
  content.innerHTML = '<div class="section-title">Available Buildings</div>';
  
  Object.entries(BUILDINGS).forEach(([key, building]) => {
    const canAfford = GAME.money >= building.cost;
    const card = document.createElement('div');
    card.className = `building-card ${!canAfford ? 'disabled' : ''}`;
    card.innerHTML = `
      <div class="building-icon">${building.icon}</div>
      <div class="building-info">
        <div class="building-name">${building.name}</div>
        <div class="building-cost">Cost: <span>$${building.cost}</span> | Workers: <span>${building.workers}</span></div>
      </div>
    `;
    card.onclick = () => !canAfford || buildBuilding(key, building);
    content.appendChild(card);
  });
}

function renderTroopsTab() {
  const content = document.getElementById('panel-content');
  content.innerHTML = '<div class="section-title">Military Units</div><p style="color: var(--text-secondary);">Deploy troops to raid neighboring colonies.</p>';
}

function renderDiplomacyTab() {
  const content = document.getElementById('panel-content');
  content.innerHTML = '<div class="section-title">Relations</div><p style="color: var(--text-secondary);">Manage alliances and treaties.</p>';
}

function renderUpgradesTab() {
  const content = document.getElementById('panel-content');
  content.innerHTML = '<div class="section-title">Technology</div><p style="color: var(--text-secondary);">Research new technologies to improve your colony.</p>';
}

function buildBuilding(key, building) {
  if (GAME.money >= building.cost) {
    GAME.money -= building.cost;
    GAME.buildings.push(building);
    showNotification(`✓ ${building.name} built!`, 'success');
    updateUI();
    renderBuildingsTab();
    drawMap();
  }
}

function sendRaid() {
  showNotification('⚔ Sending raid fleet...', 'warning');
  setTimeout(() => {
    const loot = Math.floor(Math.random() * 500) + 200;
    GAME.money += loot;
    showNotification(`✓ Raid successful! Looted $${loot}!`, 'success');
    updateUI();
  }, 2000);
}

function tradeRoute() {
  showNotification('🚢 Establishing trade route...', 'warning');
}

function diplomacy() {
  showNotification('📜 Opening diplomacy options...', 'warning');
}

function gameSpeed() {
  GAME.speed = GAME.speed === 1 ? 2 : 1;
  showNotification(`⏱ Speed: ${GAME.speed}x`, 'warning');
}

function pauseGame() {
  GAME.paused = !GAME.paused;
  showNotification(`${GAME.paused ? '⏸ PAUSED' : '▶ RESUMED'}`, 'warning');
}

function showNotification(message, type = 'info') {
  const container = document.getElementById('notifications');
  const notif = document.createElement('div');
  notif.className = `notification ${type}`;
  notif.textContent = message;
  container.appendChild(notif);
  
  setTimeout(() => notif.remove(), 3000);
}

window.addEventListener('load', () => {
  console.log('Tropico 2: Pirate\'s Revenge loaded!');
});
</script>
</body>
</html>
